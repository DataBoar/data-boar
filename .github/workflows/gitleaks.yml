# Gitleaks — secret scanning on push/PR and weekly schedule.
# OSS mode; third-party Actions use full commit SHAs (ADR 0005); bump via Dependabot.
#
# Complements other repo gates (same idea as perf-ai-challenge-2 baseline, adapted here):
# - pre-commit + pytest (PII / talent / commercial guards on the tree CI exercises)
# - Gitleaks scans credential-shaped leaks with full Git history (fetch-depth: 0),
#   catching cases hooks miss (different laptop, hook not installed, history paths).
#
# Optional: add a repo-root `.gitleaks.toml` when you need allowlists (e.g. long-lived
# doc examples that still trip heuristics). Neither this repo nor the perf-ai / challenge-2
# clones shipped one; tune here instead of mutating CI to "report only" without maintainer intent.
#
# Local parity (operator machine, not CI): use the upstream gitleaks CLI or container
# from https://github.com/gitleaks/gitleaks — pin a version or digest in your own notes;
# do not rely on undocumented random Dockerfiles for policy truth.
name: Gitleaks

permissions:
  contents: read

'on':
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # GITLEAKS_LICENSE only needed for org features; OSS works without.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  slack-notify-on-failure:
    name: Slack CI failure notify
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs: [scan]
    uses: ./.github/workflows/slack-ci-failure-notify.yml
    with:
      run_name: Gitleaks
      head_branch: ${{ github.head_ref || github.ref_name }}
      event: ${{ github.event_name }}
      html_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
