# SBOM: CycloneDX JSON from lockfile-aligned export (Phase A), then Syft on built image (Phase B).
# ADR 0003 — workflow artifacts; attach to GitHub Release when a release exists for the tag.
#
# Syft runs in the official `anchore/syft` image (version tag pinned below; bump with care).
# Third-party Actions use full commit SHAs (see ADR 0005).
name: SBOM

permissions:
  contents: read

'on':
  push:
    tags: ["v*"]
  release:
    types: [published]
  pull_request:
    branches: [main, master]
    paths:
      - "uv.lock"
      - "pyproject.toml"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/sbom.yml"
      - "scripts/generate-sbom.ps1"
      - "scripts/generate_build_digest.py"
      - "scripts/generate_release_manifest.py"
      - "core/**/*.py"
      - "main.py"
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    name: Generate SBOMs (CycloneDX + Syft)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Fork PRs: token cannot upload artifacts / release assets; same-repo PRs still validate SBOM generation.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"
          enable-cache: false

      # mariadb / mysqlclient PyPI packages may build from source when no wheel matches;
      # provide Connector/C and libmysqlclient headers (same class of fix as local Docker/dev docs).
      - name: Install OS packages for DB connector builds
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev pkg-config build-essential

      - name: Install dependencies
        run: uv sync --group dev

      - name: Export requirements from lockfile
        run: uv export --no-emit-package pyproject.toml -o requirements-sbom.txt

      - name: Generate CycloneDX JSON (Python / lockfile-aligned)
        run: >-
          uv run cyclonedx-py requirements requirements-sbom.txt
          --pyproject pyproject.toml
          --sv 1.6
          --of JSON
          --output-reproducible
          -o sbom-python.cdx.json

      - name: Generate build digest (licensing tamper check)
        run: uv run python scripts/generate_build_digest.py --quiet

      - name: Stage build digest for release verification
        run: cp core/licensing/_build_digest.txt build-digest.txt

      - name: Build image for SBOM (same Dockerfile as publish)
        run: docker build -t data_boar:sbom -f Dockerfile .

      - name: Generate release manifest inside image
        run: |
          mkdir -p dist
          chmod a+w dist
          docker run --rm -v "$PWD/dist:/out" -w /app data_boar:sbom \
            python scripts/generate_release_manifest.py --out /out/release-manifest.json --quiet
          cp dist/release-manifest.json release-manifest.json

      - name: Verify release manifest
        run: |
          docker run --rm -v "$PWD:/work" -w /app data_boar:sbom \
            python scripts/generate_release_manifest.py --check /work/release-manifest.json --quiet

      - name: Generate image SBOM (Syft → CycloneDX JSON)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/out" \
            anchore/syft:v1.28.0 \
            scan docker:data_boar:sbom \
            -o cyclonedx-json=/out/sbom-docker-image.cdx.json

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx-${{ github.sha }}
          path: |
            sbom-python.cdx.json
            sbom-docker-image.cdx.json
            build-digest.txt
            release-manifest.json
          if-no-files-found: error

      - name: Attach SBOMs to GitHub Release (when applicable)
        if: >-
          ${{
            (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
            github.event_name == 'release'
          }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_EVENT_RELEASE_TAG_NAME}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if ! gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "No GitHub Release for $TAG yet — artifacts remain on the workflow run only."
            exit 0
          fi
          gh release upload "$TAG" sbom-python.cdx.json sbom-docker-image.cdx.json build-digest.txt release-manifest.json \
            --clobber --repo "${{ github.repository }}"

  slack-notify-on-failure:
    name: Slack CI failure notify
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs: [generate]
    uses: ./.github/workflows/slack-ci-failure-notify.yml
    with:
      run_name: SBOM
      head_branch: ${{ github.head_ref || github.ref_name }}
      event: ${{ github.event_name }}
      html_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
