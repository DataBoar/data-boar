# CI: tests and dependency audit on push/PR.
# Keeps main branch healthy and improves security via automated checks.
#
# Failure posture (fail-closed by default):
#   - Individual steps: every step uses the default `continue-on-error: false`.
#     A failed step (non-zero exit code) immediately stops that job and marks
#     the run as failed — the pipeline does NOT silently pass on errors.
#   - `uv sync` / `uv pip install pip-audit` network failures: if dependency
#     fetch or lock-file install fails (network timeout, registry unavailable,
#     hash mismatch), the job exits with a non-zero code and the entire run
#     is marked FAILED (not skipped, not passed).
#   - `pip-audit` security scan: runs after install; a discovered vulnerability
#     without a matching `--ignore-vuln` entry fails the job.
#   - `fail-fast: false` on the matrix means Python-3.12/3.13/3.14 jobs
#     run to completion even if one fails, so all error logs are collected.
#     It does NOT mean "pass when there are errors" — just parallel visibility.
#   - Python 3.14 is SIGNAL-ONLY (#551): it runs the full test suite for the
#     future no-GIL Enterprise runtime but uses `continue-on-error: true` so an
#     ecosystem gap (missing wheels, dep incompatibility) does not block merges.
#     The runtime / Docker base image stays 3.12/3.13 until the licensing
#     enforcement gate is green (rationale in #551).
#
# Third-party Actions use full commit SHAs (major tag noted in comment). Refresh via Dependabot
# (github-actions) or deliberately after reading upstream release notes. astral-sh/setup-uv `version`
# pins the uv CLI release (see https://github.com/astral-sh/uv/releases), not the action repo tag.
#
# Explicit permissions limit GITHUB_TOKEN (satisfies "Workflow does not contain permissions" check).
# contents: read is the minimal scope needed for checkout and dependency install.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    # 3.14 is signal-only (#551) — see header comment. 3.12/3.13 stay blocking.
    continue-on-error: ${{ matrix.python-version == '3.14' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history required for scripts/pii_history_guard.py --full-history (PII in old commits).
          fetch-depth: 0
          persist-credentials: false

      - name: Install libmariadb-dev (mariadb PyPI connector builds from source on Linux)
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev pkg-config

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        # shares extra: smbprotocol/webdav — keeps SMB/CIFS/WebDAV connector registration aligned with TECH_GUIDE
        # dev group: pytest, hypothesis, pre-commit stack — not shipped to end-user `uv sync` default in CI test matrix
        run: uv sync --extra shares --group dev

      - name: Run tests
        run: uv run pytest -v -W error
        # addopts in pyproject.toml also set -W error; explicit in CI so tests pass without warnings.

      - name: PII history guard (full git history)
        run: uv run python scripts/pii_history_guard.py --full-history

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install libmariadb-dev (mariadb PyPI connector builds from source on Linux)
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev pkg-config

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync --extra shares --group dev
      - name: Pre-commit (all files)
        run: uv run pre-commit run --all-files

  bandit:
    name: Bandit (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install libmariadb-dev (mariadb PyPI connector builds from source on Linux)
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev pkg-config

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync --extra shares --group dev

      # Strict merge gate: -ll = MEDIUM+ severity, -ii = MEDIUM+ confidence. [tool.bandit] applies (exclude_dirs, skips).
      - name: Run Bandit (Strict Mode)
        run: uv run bandit -r . -c pyproject.toml -ll -ii

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install libmariadb-dev (mariadb PyPI connector builds from source on Linux)
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev pkg-config

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync --extra shares

      - name: Install pip-audit
        run: uv pip install pip-audit

      # CVE-2026-3219 cleared: pip>=26.1 fixes (PyPI 26.1.1 as of 2026-05); no longer suppressed.
      # PYSEC-2024-277 / PYSEC-2026-89 / PYSEC-2025-183: OSV entries without PyPI fix versions (2026-05-20); triage via deps issue.
      - name: Run pip audit
        run: uv run pip-audit --ignore-vuln PYSEC-2024-277 --ignore-vuln PYSEC-2026-89 --ignore-vuln PYSEC-2025-183

  sonar:
    name: SonarQube / SonarCloud
    runs-on: ubuntu-latest
    # Do not use `secrets.*` in job-level `if:` — it can prevent the workflow from scheduling any jobs.
    needs: [test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install libmariadb-dev (mariadb PyPI connector builds from source on Linux)
        run: sudo apt-get update && sudo apt-get install -y libmariadb-dev pkg-config

      - name: Detect Sonar token
        id: sonar_token
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.sonar_token.outputs.present == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        if: steps.sonar_token.outputs.present == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"

      - name: Install dependencies
        if: steps.sonar_token.outputs.present == 'true'
        run: uv sync --extra shares

      - name: SonarQube / SonarCloud Scan
        if: steps.sonar_token.outputs.present == 'true'
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarQube Server only: set SONAR_HOST_URL in repo secrets
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  slack-notify-on-failure:
    name: Slack CI failure notify
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs: [test, lint, bandit, audit, sonar]
    uses: ./.github/workflows/slack-ci-failure-notify.yml
    with:
      run_name: CI
      head_branch: ${{ github.head_ref || github.ref_name }}
      event: ${{ github.event_name }}
      html_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
