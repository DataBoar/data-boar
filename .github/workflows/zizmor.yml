# Zizmor static analysis for GitHub Actions workflows.
# Complements CodeQL/Semgrep/Bandit by focusing on CI/workflow-specific risks.
# Third-party Action is pinned to a full commit SHA (v0.5.3).
name: Zizmor

permissions:
  contents: read

'on':
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/workflows/zizmor.yml"
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/workflows/zizmor.yml"
  schedule:
    - cron: "0 9 * * 2"
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the workflow when zizmor finds issues."
        required: false
        default: false
        type: boolean

jobs:
  zizmor:
    name: Zizmor (GitHub Actions security lint)
    runs-on: ubuntu-latest
    env:
      # Default mode: enforced on PR/push/schedule (issue #732).
      # Opt out temporarily with repository variable ZIZMOR_ENFORCE=false.
      # workflow_dispatch defaults to advisory unless input enforce=true.
      ENFORCE_ZIZMOR: ${{ github.event_name == 'workflow_dispatch' && (inputs.enforce && 'true' || 'false') || (vars.ZIZMOR_ENFORCE == 'false' && 'false' || 'true') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run zizmor
        id: zizmor
        continue-on-error: true
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6

      - name: Warn in advisory mode
        if: ${{ steps.zizmor.outcome == 'failure' && env.ENFORCE_ZIZMOR != 'true' }}
        run: |
          echo "::warning::zizmor found workflow issues (advisory mode)."
          echo "::warning::Enforcement is on by default; set repository variable ZIZMOR_ENFORCE=false to opt out temporarily."

      - name: Enforce findings
        if: ${{ steps.zizmor.outcome == 'failure' && env.ENFORCE_ZIZMOR == 'true' }}
        run: |
          echo "zizmor found workflow issues and enforcement is enabled."
          exit 1
