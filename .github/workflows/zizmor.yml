# Zizmor static analysis for GitHub Actions workflows.
# Complements CodeQL/Semgrep/Bandit by focusing on CI/workflow-specific risks.
# Third-party Action is pinned to a full commit SHA (v0.5.3).
name: Zizmor

permissions:
  contents: read

'on':
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/workflows/zizmor.yml"
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/workflows/zizmor.yml"
  schedule:
    - cron: "0 9 * * 2"
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the workflow when zizmor finds issues."
        required: false
        default: false
        type: boolean

jobs:
  zizmor:
    name: Zizmor (GitHub Actions security lint)
    runs-on: ubuntu-latest
    env:
      # Default mode: advisory (warn-first).
      # To enforce by default, create repository variable ZIZMOR_ENFORCE=true.
      # workflow_dispatch input `enforce=true` overrides for manual runs.
      ENFORCE_ZIZMOR: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce || vars.ZIZMOR_ENFORCE == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run zizmor (advisory by default)
        id: zizmor
        continue-on-error: true
        uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727 # v0.5.4

      - name: Warn in advisory mode
        if: ${{ steps.zizmor.outcome == 'failure' && env.ENFORCE_ZIZMOR != 'true' }}
        run: |
          echo "::warning::zizmor found workflow issues (advisory mode)."
          echo "::warning::Set repository variable ZIZMOR_ENFORCE=true or run workflow_dispatch with enforce=true to fail on findings."

      - name: Enforce findings
        if: ${{ steps.zizmor.outcome == 'failure' && env.ENFORCE_ZIZMOR == 'true' }}
        run: |
          echo "zizmor found workflow issues and enforcement is enabled."
          exit 1
