# Zizmor static analysis for GitHub Actions workflows.
# Complements CodeQL/Semgrep/Bandit by focusing on CI/workflow-specific risks.
# Third-party Action is pinned to a full commit SHA (v0.5.3).
name: Zizmor

permissions:
  contents: read
  # zizmor-action's advanced-security upload (github/codeql-action/upload-sarif)
  # posts a SARIF to the Security tab even with zero findings. On push to a
  # branch that needs security-events: write (pull_request runs are allowed
  # without it). Mirrors codeql.yml so the enforced push run is deterministic.
  security-events: write
  actions: read

'on':
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/workflows/zizmor.yml"
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/**"
      - ".github/workflows/zizmor.yml"
  schedule:
    - cron: "0 9 * * 2"
  workflow_dispatch:
    inputs:
      enforce:
        description: "Fail the workflow when zizmor finds issues."
        required: false
        default: false
        type: boolean

jobs:
  zizmor:
    name: Zizmor (GitHub Actions security lint)
    runs-on: ubuntu-latest
    env:
      # Default mode: enforced on PR/push/schedule (issue #732).
      # Opt out temporarily with repository variable ZIZMOR_ENFORCE=false.
      # workflow_dispatch defaults to advisory unless input enforce=true.
      ENFORCE_ZIZMOR: ${{ github.event_name == 'workflow_dispatch' && (inputs.enforce && 'true' || 'false') || (vars.ZIZMOR_ENFORCE == 'false' && 'false' || 'true') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        id: zizmor
        continue-on-error: true
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          # Deterministic runs: skip network-dependent audits (e.g.
          # ref-version-mismatch, known-vulnerable-actions) that flap on
          # GITHUB_TOKEN rate-limits. Offline audits (template-injection,
          # excessive-permissions, artipacked, unpinned-uses, ...) still run.
          # SHA pins + exact version comments (#878) keep the offline posture.
          online-audits: false

      - name: Warn in advisory mode
        if: ${{ steps.zizmor.outcome == 'failure' && env.ENFORCE_ZIZMOR != 'true' }}
        run: |
          echo "::warning::zizmor found workflow issues (advisory mode)."
          echo "::warning::Enforcement is on by default; set repository variable ZIZMOR_ENFORCE=false to opt out temporarily."

      - name: Enforce findings
        if: ${{ steps.zizmor.outcome == 'failure' && env.ENFORCE_ZIZMOR == 'true' }}
        run: |
          echo "zizmor found workflow issues and enforcement is enabled."
          exit 1
