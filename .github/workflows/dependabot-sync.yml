# Keeps requirements.txt in sync when Dependabot updates uv.lock / pyproject.toml,
# AND auto-corrects bare requirements.txt edits when Dependabot bumps a transitive
# dependency in isolation (uv-ecosystem residual gap; see docs/adr/0045).
#
# Third-party Actions use full commit SHAs (tag in comment); bump via Dependabot (github-actions).
# Incident context:
#   * run #25080647534 — original lock vs export drift (closed by ADR 0044).
#   * run #25607356677 — chardet 7.4.3 bare requirements.txt bump on PR #347 (closed by ADR 0045).
name: Dependabot requirements.txt sync

permissions:
  contents: read

# Quoted key: PyYAML 1.1 treats bare `on` as boolean true (see semgrep.yml).
'on':
  pull_request:
    branches: [main, master]
    paths:
      - "uv.lock"
      - "pyproject.toml"
      - "requirements.txt"

concurrency:
  group: dependabot-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-requirements:
    name: Regenerate requirements.txt
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.2"
          enable-cache: true

      # Re-resolve uv.lock from pyproject.toml so the lock stays authoritative even
      # when Dependabot only edited requirements.txt (uv-ecosystem residual gap).
      # `uv lock` (without --upgrade) is a no-op when pyproject and lock already
      # agree, so the regular pyproject/uv.lock-driven path is unaffected.
      - name: Reconcile uv.lock with pyproject.toml
        run: uv lock

      - name: Regenerate requirements.txt from authoritative lock
        run: uv export --no-emit-package pyproject.toml -o requirements.txt

      - name: Commit and push reconciled artifacts
        run: |
          set -eux
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [ -n "$(git status --porcelain uv.lock requirements.txt)" ]; then
            git add uv.lock requirements.txt
            git commit -m "chore(deps): auto-reconcile uv.lock and requirements.txt"
            git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
          else
            echo "uv.lock and requirements.txt already match the resolver — nothing to commit"
          fi
