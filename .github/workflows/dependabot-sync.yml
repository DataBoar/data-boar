# Keeps requirements.txt in sync when Dependabot updates uv.lock / pyproject.toml.
# Third-party Actions use full commit SHAs (tag in comment); bump via Dependabot (github-actions).
# Incident context: CI drift when lock changes without regenerating requirements.txt (e.g. run #25080647534).
name: Dependabot requirements.txt sync

permissions:
  contents: read

# Quoted key: PyYAML 1.1 treats bare `on` as boolean true (see semgrep.yml).
'on':
  pull_request:
    branches: [main, master]
    paths:
      - "uv.lock"
      - "pyproject.toml"

concurrency:
  group: dependabot-sync-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-requirements:
    name: Regenerate requirements.txt
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.2"
          enable-cache: true

      - name: Regenerate requirements.txt
        run: uv export --no-emit-package pyproject.toml -o requirements.txt

      - name: Commit and push changes
        run: |
          set -eux
          if [ -n "$(git status --porcelain requirements.txt)" ]; then
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add requirements.txt
            git commit -m "chore(deps): auto-regenerate requirements.txt after uv.lock update"
            git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}" \
              "HEAD:${GITHUB_EVENT_PULL_REQUEST_HEAD_REF}"
          else
            echo "No changes to requirements.txt"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_EVENT_PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref }}

  slack-notify-on-failure:
    name: Slack CI failure notify
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    needs: [sync-requirements]
    uses: ./.github/workflows/slack-ci-failure-notify.yml
    with:
      run_name: Dependabot requirements.txt sync
      head_branch: ${{ github.head_ref || github.ref_name }}
      event: ${{ github.event_name }}
      html_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
