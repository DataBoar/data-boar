# Operator-gated issue close guard (GitHub #990, ADR-0072).
#
# Issues labeled `operator-gated` (e.g. release gate #406) cannot stay CLOSED unless:
#   (a) label `gate-close-approved` is present at close time, OR
#   (b) the **latest** issue comment starts with the deliberate trailer AND includes a
#       file-namespace SSHSIG block verified via gate_trailer_attest.py (ADR-0056).
#
# Do NOT scan issue body or comment history — a protocol doc comment citing the trailer
# in backticks would otherwise allow any close (fatal false negative).
#
# Actor identity is NOT trusted (operator and agents share the same GitHub account).
name: Operator-gated issue reopen

permissions:
  issues: write
  contents: read

on:
  issues:
    types: [closed]

jobs:
  guard-reopen:
    name: Reopen without close approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (SSHSIG verify)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: |
            scripts/gate_trailer_attest.py
            docs/adr/allowed_signers
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Enforce operator-gated close contract
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const fs = require("fs");
            const { execSync } = require("child_process");
            const OPERATOR_GATED_LABEL = "operator-gated";
            const APPROVED_CLOSE_LABEL = "gate-close-approved";
            const CLOSE_MARKER =
              /^\s*Gate-Close-Approved-By:\s*@?FabioLeitao\b/im;
            const SIG_BLOCK =
              /-----BEGIN SSH SIGNATURE-----[\s\S]+-----END SSH SIGNATURE-----/;

            const issue = context.payload.issue;
            const labels = (issue.labels || []).map((l) => l.name);
            if (!labels.includes(OPERATOR_GATED_LABEL)) {
              core.info(
                `Issue #${issue.number} lacks ${OPERATOR_GATED_LABEL} — no-op`
              );
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = issue.number;

            if (labels.includes(APPROVED_CLOSE_LABEL)) {
              core.info(
                `Issue #${issue_number}: ${APPROVED_CLOSE_LABEL} label — close allowed`
              );
              return;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              }
            );

            let latestBody = "";
            if (comments.length === 0) {
              core.warning(
                `Issue #${issue_number}: no comments — cannot verify close trailer`
              );
            } else {
              const sorted = [...comments].sort(
                (a, b) => new Date(b.created_at) - new Date(a.created_at)
              );
              latestBody = sorted[0].body || "";
              if (
                CLOSE_MARKER.test(latestBody) &&
                SIG_BLOCK.test(latestBody)
              ) {
                const commentPath = "close-comment.md";
                fs.writeFileSync(commentPath, latestBody);
                try {
                  execSync(
                    "uv run python scripts/gate_trailer_attest.py verify --message-file close-comment.md",
                    { cwd: process.env.GITHUB_WORKSPACE, stdio: "pipe" }
                  );
                  core.info(
                    `Issue #${issue_number}: trailer + verified SSHSIG — close allowed`
                  );
                  return;
                } catch (err) {
                  core.warning(
                    `Issue #${issue_number}: SSHSIG verify failed — ${err.message}`
                  );
                }
              } else if (CLOSE_MARKER.test(latestBody)) {
                core.warning(
                  `Issue #${issue_number}: trailer without valid SSHSIG block`
                );
              }
            }

            const notice =
              "Auto-reopened: issue `operator-gated` fechada sem aprovação válida. " +
              "Use **uma** destas opções na próxima tentativa:\n" +
              "1. Comentário de fechamento com **trailer + bloco SSHSIG** verificável " +
              "(`gate_trailer_attest.py verify --message-file …`; ver ADR-0056 / ADR-0072), ou\n" +
              "2. Label `gate-close-approved` antes de fechar.\n\n" +
              "Texto do trailer **sozinho** não basta — exige assinatura SSH file-namespace.";

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: notice,
            });

            await github.rest.issues.update({
              owner,
              repo,
              issue_number,
              state: "open",
            });

            core.warning(
              `Issue #${issue_number} reopened — missing close approval`
            );
