# CodeQL: security and quality analysis for Python (OWASP, injection, etc.).
# Results appear under Security > Code scanning; configure rulesets for merge protection.
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning
#
# Actions pinned to full commit SHAs (tag in comment); bump via Dependabot or after upstream review.
#
# Explicit permissions satisfy GitHub's "Workflow does not contain permissions" requirement:
# - contents: read — checkout and read repo
# - security-events: write — upload CodeQL results to Security tab
# - actions: read — CodeQL action may need to read other actions
name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly run (default branch) to catch new CodeQL findings
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          languages: ${{ matrix.language }}
          # Keep broad default coverage for "just in case" findings.
          # Do not remove existing project hardening rules; this augments them.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          category: "/language:${{ matrix.language }}"
