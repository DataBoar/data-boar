# Dependabot: automated dependency and workflow updates for security and maintenance.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project uses pyproject.toml (PEP 621) at repo root with `uv` as the resolver
# (uv.lock is the canonical pin; requirements.txt is generated via `uv export`).
# We use package-ecosystem "uv" so Dependabot updates `pyproject.toml` and `uv.lock`
# together. The `.github/workflows/dependabot-sync.yml` workflow then auto-regenerates
# `requirements.txt` from the new lock and pushes it back to the PR branch, satisfying
# the closure rule in docs/adr/0030 and the lock-vs-export guard in
# tests/test_dependency_artifacts_sync.py without operator intervention.
# Rationale: docs/adr/0044-dependabot-uv-ecosystem-for-pyproject-lock-closure.md.
version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps(uv)"
    groups:
      # Batch minor/patch updates into one PR to reduce noise; security updates still created separately
      uv-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Upstream-blocked transitive dependencies. Each ignore must cite the upstream
    # constraint (and a stop condition: when does the cap go away?). Document in
    # docs/adr/ when adding/removing entries here. Closure rule: docs/adr/0045.
    ignore:
      # `chardet` is pulled in transitively only by `cyclonedx-bom` (dev/SBOM
      # toolchain). The latest cyclonedx-bom (7.3.0) pins `chardet>=5.1,<6.0`
      # — see https://pypi.org/project/cyclonedx-bom/. Until cyclonedx-bom
      # publishes a release that relaxes that cap, any major bump of chardet
      # (>=6) breaks the Docker SBOM build with `ResolutionImpossible`.
      # Stop condition: when cyclonedx-bom publishes a release allowing
      # `chardet>=6`, drop this entry and let Dependabot bump chardet again.
      # Tracking: docs/adr/0045-chardet-pinned-by-cyclonedx-bom.md.
      - dependency-name: "chardet"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (workflows and action versions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci(actions)"
