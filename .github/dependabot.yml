# Dependabot: automated dependency and workflow updates for security and maintenance.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project uses pyproject.toml (PEP 621) at repo root with `uv` as the resolver
# (uv.lock is the canonical pin; requirements.txt is generated via `uv export`).
# We use package-ecosystem "uv" so Dependabot updates `pyproject.toml` and `uv.lock`
# together. The `.github/workflows/dependabot-sync.yml` workflow then auto-regenerates
# `requirements.txt` from the new lock and pushes it back to the PR branch, satisfying
# the closure rule in docs/adr/0030 and the lock-vs-export guard in
# tests/test_dependency_artifacts_sync.py without operator intervention.
# Rationale: docs/adr/ADR-0044-dependabot-uv-ecosystem-for-pyproject-lock-closure.md.
version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps(uv)"
    groups:
      # Batch minor/patch updates into one PR to reduce noise; security updates still created separately
      uv-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Upstream-capped transitives: `ignore` blocks Dependabot version-update PRs only;
    # security advisories still surface. See docs/adr/ADR-0053-*.md, ADR-0054-*.md, ADR-0069-*.md.
    ignore:
      # ebcdic 2.x is incompatible with extract-msg 0.55.x (requires_dist ebcdic<2,>=1.1.1).
      - dependency-name: "ebcdic"
        update-types: ["version-update:semver-major"]
      # chardet 6+ is incompatible with cyclonedx-bom until upstream relaxes chardet<6.0.
      - dependency-name: "chardet"
        update-types: ["version-update:semver-major"]
      # rpds-py 2026.x is a breaking CalVer pivot (legitimate but red on 3.12/3.13/3.14);
      # capped <2026 via [tool.uv] constraint-dependencies. See docs/adr/ADR-0069-*.md.
      - dependency-name: "rpds-py"
        update-types: ["version-update:semver-major"]
    cooldown:
      default-days: 7

  # GitHub Actions (workflows and action versions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci(actions)"
    cooldown:
      default-days: 7

  # Base image digest pins in Dockerfile (ADR-0074 / #988).
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "deps(docker)"
    cooldown:
      default-days: 7
