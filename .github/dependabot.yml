# Dependabot: automated dependency and workflow updates for security and maintenance.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project uses pyproject.toml (PEP 621) at repo root with `uv` as the resolver
# (uv.lock is the canonical pin; requirements.txt is generated via `uv export`).
# We use package-ecosystem "uv" so Dependabot updates `pyproject.toml` and `uv.lock`
# together. The `.github/workflows/dependabot-sync.yml` workflow then auto-regenerates
# `requirements.txt` from the new lock and pushes it back to the PR branch, satisfying
# the closure rule in docs/adr/0030 and the lock-vs-export guard in
# tests/test_dependency_artifacts_sync.py without operator intervention.
# Rationale: docs/adr/0044-dependabot-uv-ecosystem-for-pyproject-lock-closure.md.
version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps(uv)"
    groups:
      # Batch minor/patch updates into one PR to reduce noise; security updates still created separately
      uv-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # ebcdic 2.x is incompatible with our resolved tree: extract-msg (>=0.55.0, the latest)
      # hard-pins `ebcdic<2,>=1.1.1` in its requires_dist. `uv lock --upgrade-package ebcdic`
      # therefore refuses to advance past 1.1.1, but Dependabot's uv ecosystem occasionally
      # rewrites only requirements.txt for transitive packages — producing a PR that violates
      # the resolver and fails `tests/test_dependency_artifacts_sync.py::test_requirements_txt_matches_uv_export`
      # (see CI run 25607342909, PR #346). Ignore the 2.x major bump here until extract-msg
      # upstream relaxes the constraint or we replace the dependency.
      # Rationale: docs/adr/0045-dependabot-ignore-ebcdic-2x-blocked-by-extract-msg.md.
      - dependency-name: "ebcdic"
        versions: [">=2.0.0"]

  # GitHub Actions (workflows and action versions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci(actions)"
