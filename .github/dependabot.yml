# Dependabot: automated dependency and workflow updates for security and maintenance.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# This project uses pyproject.toml (PEP 621) at repo root with `uv` as the resolver
# (uv.lock is the canonical pin; requirements.txt is generated via `uv export`).
# We use package-ecosystem "uv" so Dependabot updates `pyproject.toml` and `uv.lock`
# together. The `.github/workflows/dependabot-sync.yml` workflow then auto-regenerates
# `requirements.txt` from the new lock and pushes it back to the PR branch, satisfying
# the closure rule in docs/adr/0030 and the lock-vs-export guard in
# tests/test_dependency_artifacts_sync.py without operator intervention.
# Rationale: docs/adr/ADR-0044-dependabot-uv-ecosystem-for-pyproject-lock-closure.md.
version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "deps(uv)"
    groups:
      # Batch minor/patch updates into one PR to reduce noise; security updates still created separately
      uv-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # Upstream-blocked transitive dependencies.
    # Each ignore MUST cite the upstream constraint and a stop condition
    # (when can the cap be removed?). Document in docs/adr/ when adding or
    # removing entries here. Closure rule: docs/adr/ADR-0053.
    ignore:
      # `chardet` is pulled in transitively only by `cyclonedx-bom` (dev/SBOM
      # toolchain). The latest `cyclonedx-bom` on PyPI (7.3.0, 2026-03-30) pins
      # `chardet>=5.1,<6.0`. Any major bump of `chardet` (>=6) therefore breaks
      # the Docker SBOM build with pip's `ResolutionImpossible` — see Actions
      # run 25879920050 and PR #347 (chardet 5.2.0 -> 7.4.3).
      # Stop condition: when `cyclonedx-bom` publishes a release that allows
      # `chardet>=6`, remove this entry and let Dependabot bump `chardet` again.
      # Tracking: docs/adr/ADR-0053-chardet-pinned-by-cyclonedx-bom.md.
      - dependency-name: "chardet"
        update-types: ["version-update:semver-major"]

  # GitHub Actions (workflows and action versions)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci(actions)"
