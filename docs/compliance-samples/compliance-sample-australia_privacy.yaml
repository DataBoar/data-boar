# Australia Privacy Act – sample compliance profile (Privacy Act 1988, OAIC, APPs)
#
# NOT LEGAL ADVICE. This file is a technical starting point for operators and engineers.
#
# Target audience: Australian and Oceania deployments. OAIC; Australian Privacy Principles (APPs);
# Notifiable Data Breaches (NDB) scheme. Key identifiers: Tax File Number (TFN), Medicare.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-australia_privacy.yaml
#        ml_patterns_file: path/to/compliance-sample-australia_privacy.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Privacy Act 1988 (Cth): major amendment Act passed November 2024 (Privacy and Other
# Legislation Amendment Act 2024). Key reforms: statutory tort for serious invasions of
# privacy (commencement TBD), children's online privacy code, APP clarity amendments. Some
# provisions (small business exemption removal, direct right of action) were deferred or
# dropped — revalidate with counsel for your coverage period.
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - Privacy Act applies to APP entities (federal agencies + organisations with annual turnover
#     > AUD $3M; also health service providers regardless of size). Some states have their own
#     privacy acts (NSW, VIC, QLD, ACT, NT) — this sample targets the federal Act only.
#   - Data Boar performs technical pattern and term matching only. It does NOT evaluate APP
#     compliance, NDB notification thresholds, or state-law overlay. Use output as inventory
#     signal; scope determination with counsel.
#
# Regex design:
#   - TFN_AU / TFN_AU_SPACED: Australian Tax File Number (ATO). 8–9 digits; high false-positive
#     risk on generic numeric strings — tune fuzzy confidence threshold upward or review
#     findings in context. Spaced variant covers "123 456 782" display format.
#   - MEDICARE_AU: Medicare card number (10 digits + optional individual reference digit).
#   - ABN_AU: Australian Business Number (11 digits, space-separated groups 2-3-3-3); may appear
#     alongside personal data in health/provider contexts.
#   - AU_PASSPORT: Australian passport (1–2 uppercase letters + 7 digits).
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml. Location data linked to an identifiable individual is
#     "personal information" under Privacy Act s.6. Patterns are heuristic coordinate-shape
#     signals only — not automatic OAIC or APP classification.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  - name: "TFN_AU"
    # Tax File Number: 8 digits (older issuance)
    pattern: "\\b\\d{8}\\b"
    norm_tag: "Australia Privacy"
  - name: "TFN_AU_ALT"
    # Tax File Number: 9 digits (current issuance)
    pattern: "\\b\\d{9}\\b"
    norm_tag: "Australia Privacy"
  - name: "TFN_AU_SPACED"
    # Tax File Number displayed as NNN NNN NNN (three groups of 3)
    pattern: "\\b\\d{3}\\s\\d{3}\\s\\d{3}\\b"
    norm_tag: "Australia Privacy"
  - name: "MEDICARE_AU"
    # Medicare card: 10 digits + optional individual reference digit (space-separated)
    pattern: "\\b\\d{10}\\s?\\d\\b"
    norm_tag: "Australia Privacy"
  - name: "ABN_AU"
    # Australian Business Number: NN NNN NNN NNN (11 digits, grouped)
    pattern: "\\b\\d{2}\\s?\\d{3}\\s?\\d{3}\\s?\\d{3}\\b"
    norm_tag: "Australia Privacy"
  - name: "AU_PASSPORT"
    # Australian passport: 1–2 uppercase letters + 7 digits (e.g. PA1234567 or N1234567)
    pattern: "\\b[A-Z]{1,2}\\d{7}\\b"
    norm_tag: "Australia Privacy"
  # Precise geolocation (Privacy Act s.6 — location data identifying an individual = personal info)
  - name: "AU_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Australia Privacy"
  - name: "AU_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Australia Privacy"
  - name: "AU_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Australia Privacy"
  - name: "AU_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Australia Privacy"

