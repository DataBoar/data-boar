recommendation_overrides:
  - norm_tag_pattern: "Australia Privacy"
    base_legal: "Privacy Act 1988 (Cth); OAIC; Australian Privacy Principles (APPs); Privacy and Other Legislation Amendment Act 2024; NDB scheme (Part IIIC)"
    risk: "Personal information (including sensitive information under s.6 — health, biometric, genetic, racial/ethnic origin, political opinion, religious belief, trade union membership, sexual orientation, criminal record) in scope of Privacy Act 1988. Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only — not automatic OAIC classification. NDB notification window: 30 days to notify OAIC and affected individuals when an eligible data breach occurs."
    recommendation: "Comply with applicable APPs (collection, use, disclosure, quality, security, openness, access and correction, identifiers, anonymity, transborder data flows); assess NDB eligibility within 30 days; consult OAIC guidelines; consider privacy impact assessment (PIA) for high-risk activities; revalidate with counsel for 2024 amendment commencement dates."
    priority: "ALTA"
    relevant_for: "Privacy Officer, DPO, OAIC, Legal, Information Security, Product"
