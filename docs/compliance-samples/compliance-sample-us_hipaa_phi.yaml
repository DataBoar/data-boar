# US HIPAA / PHI — sample compliance profile
#
# Target audience: US covered entities (health plans, health care clearinghouses,
# health care providers), business associates, and any organisation processing
# Protected Health Information (PHI) under the Health Insurance Portability and
# Accountability Act of 1996 (HIPAA) and the HITECH Act 2009.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-us_hipaa_phi.yaml
#        ml_patterns_file: path/to/compliance-sample-us_hipaa_phi.yaml
#   2. Merge the recommendation_overrides list below into your config under
#      report.recommendation_overrides.
#
# Legal scope:
#   - HIPAA Privacy Rule (45 CFR Part 164, Subpart E): governs use and
#     disclosure of PHI by covered entities and business associates.
#   - HIPAA Security Rule (45 CFR Part 164, Subpart C): administrative,
#     physical, and technical safeguards for electronic PHI (ePHI).
#   - HIPAA Breach Notification Rule (45 CFR §§ 164.400-414): notification to
#     individuals (60 days), HHS OCR, and media (if > 500 individuals in a state).
#   - HITECH Act (2009): strengthens enforcement, extends Security Rule to
#     business associates directly, introduces tiered civil monetary penalties.
#   - Enforcement: HHS Office for Civil Rights (OCR); state attorneys general.
#   - PHI = individually identifiable health information (18 identifiers under
#     Safe Harbor de-identification standard, 45 CFR § 164.514(b)(2)).
#   - Special sensitivity: psychotherapy notes (45 CFR § 164.508(a)(2));
#     substance use disorder records (42 CFR Part 2); reproductive health;
#     genetic information (GINA — 45 CFR § 164.502(a)(5)(i)).
#
# Regex design:
#   - US_HIPAA_NPI: National Provider Identifier — 10-digit number, contextual
#     (preceded by "NPI" or "national provider"); ISO 17533.
#   - US_HIPAA_DEA: DEA Registration Number — 2 uppercase letters + 7 digits,
#     contextual prefix "DEA"; not a standalone health identifier but common in
#     prescriber workflows.
#   - US_HIPAA_MRN: Medical Record Number — alphanumeric 6-12 chars with
#     contextual "MRN" prefix; institutions vary widely in format.
#   - US_HIPAA_ICD10: ICD-10-CM diagnosis code — letter + 2 digits + optional
#     decimal + 1-4 chars; contextual prefix "ICD" or "diagnosis code".
#   - Precise geolocation: same four-decimal-place geometry as
#     compliance-sample-us_va_vcdpa.yaml. Geographic data smaller than state
#     level is one of the 18 PHI identifiers (Safe Harbor item 3);
#     coordinates in EHR/log data are an inventory signal for PHI exposure.
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "US_HIPAA_NPI"
    # National Provider Identifier: 10-digit number with contextual prefix
    pattern: "\\b(?:NPI|national\\s+provider(?:\\s+identifier)?)\\s*[:#]?\\s*\\d{10}\\b"
    norm_tag: "HIPAA PHI"
  - name: "US_HIPAA_DEA"
    # DEA registration number: 2 uppercase letters + 7 digits (contextual)
    pattern: "\\b(?:DEA|dea\\s*reg(?:istration)?)\\s*[:#]?\\s*[A-Z]{2}\\d{7}\\b"
    norm_tag: "HIPAA PHI"
  - name: "US_HIPAA_MRN"
    # Medical record number: 6-12 alphanumeric chars with contextual prefix
    pattern: "\\b(?:MRN|medical\\s+record\\s+(?:no|num|number|id))\\s*[:#]?\\s*[A-Z0-9]{6,12}\\b"
    norm_tag: "HIPAA PHI"
  - name: "US_HIPAA_ICD10"
    # ICD-10-CM diagnosis code with contextual prefix
    pattern: "\\b(?:ICD-?10|diagnosis\\s+code)\\s*[:#]?\\s*[A-Z]\\d{2}\\.?[A-Z0-9]{1,4}\\b"
    norm_tag: "HIPAA PHI"
  # Precise geolocation — geographic data < state level is PHI Safe Harbor identifier #3
  # (45 CFR § 164.514(b)(2)(i)) — same four-decimal geometry as reference VCDPA sample
  - name: "HIPAA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "HIPAA PHI"
  - name: "HIPAA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "HIPAA PHI"
  - name: "HIPAA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "HIPAA PHI"
  - name: "HIPAA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "HIPAA PHI"

