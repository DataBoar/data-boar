recommendation_overrides:
  - norm_tag_pattern: "HIPAA PHI"
    base_legal: "Health Insurance Portability and Accountability Act of 1996 (HIPAA); HITECH Act 2009; Privacy Rule (45 CFR Part 164 Subpart E); Security Rule (45 CFR Part 164 Subpart C); Breach Notification Rule (45 CFR §§ 164.400-414); Enforcement Rule (45 CFR Part 160); HHS Office for Civil Rights (OCR). Special sensitivity: psychotherapy notes (45 CFR § 164.508(a)(2)); substance use disorder records (42 CFR Part 2); genetic information (GINA, 45 CFR § 164.502(a)(5)(i))."
    risk: "Protected Health Information (PHI) detected — individually identifiable health information subject to HIPAA. Includes 18 Safe Harbor identifiers: names, geographic data smaller than state (including coordinates), dates (except year), phone/fax, email, SSN, MRN, health plan beneficiary numbers, account numbers, certificate/license numbers, vehicle/device identifiers, URLs, IP addresses, biometric identifiers, full-face photographs, and unique codes. ePHI requires Security Rule safeguards. Geolocation coordinates in logs or APIs are a heuristic inventory signal for geographic PHI (Safe Harbor item 3); not a classification — scope with HIPAA counsel. Breach of unsecured PHI triggers notification within 60 days to individuals, HHS OCR, and (for > 500 in a state) media."
    recommendation: "Confirm covered-entity or business-associate status; execute BAA with all downstream processors; apply minimum-necessary standard to all disclosures; implement Privacy Rule access, amendment, and accounting-of-disclosures rights (45 CFR §§ 164.524-528); document Notice of Privacy Practices (NPP) and distribute to patients; conduct Security Rule risk analysis and risk management (45 CFR §§ 164.308(a)(1)); implement administrative, physical, and technical safeguards for ePHI; apply encryption or equivalent measures to render PHI unusable per Breach Notification safe harbour; notify HHS OCR within 60 days of breach discovery (45 CFR § 164.412); for psychotherapy notes and substance-use records, obtain separate written authorisation; for genetic data, apply GINA restrictions; maintain HIPAA compliance programme with workforce training and designated Privacy/Security Officers."
    priority: "ALTA"
    relevant_for: "Privacy Officer, Security Officer, Legal, Health IT, Compliance, Business Associates, EHR/EMR vendors, pharma and insurance data teams"
