    risk: "Personal and specific personal data; consent and legal bases; domestic and cross-border flows; biometric, health, and geolocation inventory signals — sector and localization rules are not evaluated by the scanner."
    recommendation: "Map PDP roles (pengendali/pemroses); document lawful bases and transfer mechanisms; align retention and DPIA practice with Indonesian guidance; pair findings with local counsel."
    priority: "ALTA"
    relevant_for: "DPO, Privacy Counsel, Data Controller, Data Processor"
