recommendation_overrides:
  - norm_tag_pattern: "Vietnam PDPD Art. 9 (sensitive — health)"
    base_legal: "Vietnam PDPD (Nghị định 13/2023/NĐ-CP) Art. 9 — dữ liệu sức khỏe là dữ liệu cá nhân nhạy cảm. In force since 1 July 2024. Authority: Bộ Công an."
    risk: "Health / medical data is classified as sensitive personal data under Art. 9. Requires explicit consent and heightened security measures. Cross-border transfer requires impact assessment and Ministry of Public Security notification."
    recommendation: "Verify explicit consent for collection. Assess cross-border transfer obligations (Art. 25 — impact assessment + notification to Bộ Công an for critical transfers). Engage DPO / legal counsel. This label is not a legal conclusion."
    priority: "HIGH"
    relevant_for: "DPO, legal, IT security, APAC compliance team"

  - norm_tag_pattern: "Vietnam PDPD Art. 9 (sensitive — ID)"
    base_legal: "Vietnam PDPD (Nghị định 13/2023/NĐ-CP) Art. 9 — national ID, passport, and biometric reference numbers as sensitive personal data. In force since 1 July 2024."
    risk: "National identity documents are sensitive personal data under Art. 9. Unauthorised disclosure or cross-border transfer may trigger regulatory penalties and mandatory data breach notification."
    recommendation: "Apply data minimisation; verify lawful basis and explicit consent where applicable. For cross-border transfers, conduct a Personal Data Protection Impact Assessment (DPIA) and notify Bộ Công an if required. Consult legal counsel."
    priority: "HIGH"
    relevant_for: "DPO, legal, IT security"

  - norm_tag_pattern: "Vietnam PDPD Art. 9 (sensitive — geolocation)"
    base_legal: "Vietnam PDPD (Nghị định 13/2023/NĐ-CP) Art. 9 — thông tin vị trí địa lý chính xác là dữ liệu nhạy cảm. In force since 1 July 2024."
    risk: "Precise geolocation is classified as sensitive personal data under Art. 9. Heightened consent, security, and cross-border transfer rules apply."
    recommendation: "Minimise precision of stored coordinates. Verify explicit consent. Assess cross-border transfer obligations. Consult legal counsel. Heuristic inventory only — not a legal determination."
    priority: "HIGH"
    relevant_for: "DPO, legal, product team"

  - norm_tag_pattern: "Vietnam PDPD Art. 9 (sensitive — social insurance)"
    base_legal: "Vietnam PDPD (Nghị định 13/2023/NĐ-CP) Art. 9 — social insurance codes linked to health/financial data classified as sensitive. In force since 1 July 2024."
    risk: "Social insurance / BHXH numbers are linked to health and financial records. Classified as sensitive personal data under Art. 9 in combination."
    recommendation: "Apply access controls, minimise retention, and verify lawful basis. Consult DPO and legal counsel for any cross-border use."
    priority: "HIGH"
    relevant_for: "DPO, legal, HR, payroll"

  - norm_tag_pattern: "Vietnam PDPD Art. 2 (personal data)"
    base_legal: "Vietnam PDPD (Nghị định 13/2023/NĐ-CP) Art. 2 — dữ liệu cá nhân cơ bản. In force since 1 July 2024. Authority: Bộ Công an."
    risk: "Basic personal data under Art. 2. Controllers must register processing activities with Bộ Công an for certain categories. Breach notification obligation applies."
    recommendation: "Ensure lawful basis, consent where required, and breach notification readiness (Art. 23 — 72 h to Bộ Công an). Register data processing activities if required. Consult DPO and legal counsel."
    priority: "MEDIUM"
    relevant_for: "DPO, legal, IT security, APAC compliance"
