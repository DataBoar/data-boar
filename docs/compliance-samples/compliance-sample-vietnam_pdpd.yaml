# Vietnam — Personal Data Protection Decree (Nghị định 13/2023/NĐ-CP)
# In force: 1 July 2024 (transitional period ended; full enforcement)
#
# NOT LEGAL ADVICE. Technical starting point for inventory of personal data fields
# in systems subject to Vietnam's PDPD. Does NOT certify compliance or replace
# legal counsel, DPO analysis, or engagement with Vietnamese authorities.
#
# Authority: Bộ Công an (Ministry of Public Security) / Cục An ninh mạng
# (Department of Cybersecurity and High-Tech Crime Prevention).
# Reference: Nghị định 13/2023/NĐ-CP — thuvienphapluat.vn / chinhphu.vn
#
# Key scope: Any organisation collecting, storing, using, disclosing, or transferring
# personal data of individuals in Vietnam, regardless of where the controller is
# located. Extraterritorial reach similar to GDPR.
#
# Pair with: compliance-sample-eu_gdpr.yaml or compliance-sample-singapore_pdpa.yaml
# for cross-border or APAC deployments.
#
# How to use:
#   regex_overrides_file: path/to/compliance-sample-vietnam_pdpd.yaml
#   ml_patterns_file:     path/to/compliance-sample-vietnam_pdpd.yaml
#   Merge recommendation_overrides into report.recommendation_overrides.
#
# Token-aware note: use session token `compliance` or `pdpd` in Cursor / Composer 2.
# Regex: use double-quoted YAML with escaped backslashes (see yaml-regex-patterns.mdc).

regex:
  # --- Vietnam national identifiers ---
  - name: "VN_CCCD"
    # Căn cước công dân (National ID Card) — 12 digits, issued 2021 onwards.
    # Previous CMND (9-digit) still valid; combined pattern covers both.
    pattern: "\\b\\d{12}\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — ID)"

  - name: "VN_CMND_OLD"
    # Chứng minh nhân dân — old 9-digit national ID (phased out but data still present).
    pattern: "\\b\\d{9}\\b"
    norm_tag: "Vietnam PDPD Art. 2 (personal data)"

  - name: "VN_PASSPORT"
    # Vietnamese passport: 1 letter + 7 digits (e.g. B1234567).
    pattern: "\\b[A-Z]\\d{7}\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — ID)"

  - name: "VN_PHONE"
    # Vietnamese mobile / landline: 10 digits starting with 0, optional separators.
    pattern: "\\b0\\d{2}[-\\s]?\\d{3}[-\\s]?\\d{4}\\b"
    norm_tag: "Vietnam PDPD Art. 2 (personal data)"

  - name: "VN_TAX_CODE_PERSONAL"
    # Mã số thuế cá nhân (personal tax code) — 10 digits.
    pattern: "\\b\\d{10}\\b"
    norm_tag: "Vietnam PDPD Art. 2 (personal data)"

  - name: "VN_TAX_CODE_BUSINESS"
    # Mã số thuế doanh nghiệp (business tax code) — 13 digits.
    pattern: "\\b\\d{10}-\\d{3}\\b"
    norm_tag: "Vietnam PDPD Art. 2 (personal data)"

  - name: "VN_BHXH"
    # Mã số bảo hiểm xã hội (social insurance code) — 10 digits.
    pattern: "\\b\\d{10}\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — social insurance)"

  # --- Precise geolocation (same geometry as GDPR/VCDPA samples) ---
  - name: "VN_PDPD_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — geolocation)"

  - name: "VN_PDPD_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — geolocation)"

  - name: "VN_PDPD_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — geolocation)"

  # --- Field label patterns ---
  - name: "VN_FIELD_CCCD_LABEL"
    pattern: "(?i)\\b(cccd|cmnd|can[_\\s]?cuoc|chung[_\\s]?minh)\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — ID)"

  - name: "VN_FIELD_HEALTH_LABEL"
    pattern: "(?i)\\b(ho[_\\s]?so[_\\s]?benh[_\\s]?an|benh[_\\s]?an|y[_\\s]?te|suc[_\\s]?khoe|kham[_\\s]?benh|benh[_\\s]?vien)\\b"
    norm_tag: "Vietnam PDPD Art. 9 (sensitive — health)"

