recommendation_overrides:
  - norm_tag_pattern: "Quebec Law 25"
    base_legal: "Quebec Act to modernize legislative provisions respecting the protection of personal information (Law 25); Commission d'acces a l'information du Quebec (CAI)."
    risk: "Elevated governance, transparency, consent, and breach-notification expectations vs legacy private-sector practice; biometric, geolocation, and automated processing inventory signals require counsel-aligned controls — PIPEDA vs Law 25 scope splits are not evaluated by the scanner."
    recommendation: "Confirm Act applicability (Quebec establishment vs extraterritorial triggers); align policies, PIAs, CAI notification practice, and cross-border mechanisms; pair technical inventory with Quebec/Federal privacy counsel."
    priority: "ALTA"
    relevant_for: "DPO, Privacy Counsel, CAI liaison, Person responsible for the protection of personal information"
