recommendation_overrides:
  - norm_tag_pattern: "US FTC COPPA"
    base_legal: "Children's Online Privacy Protection Act (COPPA), 15 U.S.C. §§ 6501-6506; FTC COPPA Rule (16 CFR Part 312, eff. 2013); FTC 2024 COPPA Rule Amendment (monitor Federal Register for final effective date)"
    risk: "Data may relate to personal information of children under 13 in scope of COPPA. Personal information under COPPA includes: name, address, email, phone, SSN, persistent identifiers (cookies, IP, device ID when linked), photos/video/audio with child's image or voice, geolocation sufficient to identify a street name, and (2024 amendment) biometric identifiers. FTC enforcement penalties up to $51,744 per violation per day (adjusted annually). Personal liability is possible. Ed-tech operators face strict data-use limits even with school-based consent. Scanner does NOT verify age, VPC status, or safe harbor enrollment."
    recommendation: "Assess whether site/app is 'directed to children' per 16 CFR § 312.2 subject-matter test or whether operator has 'actual knowledge' of under-13 users; obtain Verifiable Parental Consent (VPC) before collecting, using, or disclosing children's personal information; implement data minimization and restricted retention; evaluate FTC-approved safe harbor enrollment (kidSAFE, CARU, PRIVO); review 2024 rulemaking changes on targeted advertising and biometric identifiers before rule takes effect; for ed-tech deployments, confirm school-consent scope and data-use limitations."
    priority: "ALTA"
    relevant_for: "DPO, COPPA counsel, product/engineering (age-gate, VPC flow), FTC-facing compliance review"
