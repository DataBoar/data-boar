recommendation_overrides:
  - norm_tag_pattern: "Russia 152-FZ"
    base_legal: "Federal Law No. 152-FZ (On Personal Data); Roskomnadzor supervision; Federal Law No. 266-FZ (2022) — strengthened obligations"
    risk: "Personal data including special categories (Art. 10: racial/ethnic origin, political opinion, religious/philosophical belief, health, sexual life, biometric data, criminal record) under 152-FZ. Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only. Data localization (Art. 22.1): personal data of Russian citizens must be stored in Russia on initial collection. Mandatory breach notification: 72 h initial + 5 days detailed report to Roskomnadzor (266-FZ 2022). Regulatory baseline evolves frequently — revalidate."
    recommendation: "Map processing to 152-FZ roles and legal grounds; maintain records and privacy notices; ensure localization for Russian citizens' personal data; implement 72-hour breach notification process; apply strict safeguards for special categories (Art. 10); obtain explicit consent where required; involve qualified Russian data-protection counsel given frequent law and guidance changes."
    priority: "ALTA"
    relevant_for: "DPO, Personal data operator, Roskomnadzor, Legal, Information Security"
