# Russia 152-FZ – sample compliance profile (Federal Law No. 152-FZ "On Personal Data")
#
# NOT LEGAL ADVICE. This file is a technical starting point for operators and engineers.
#
# Regulatory drift: Russian personal-data law and related secondary rules are amended and
# reinterpreted frequently. Revalidate these regexes and ML terms with qualified counsel and
# against your data facts; refresh the sample when your program or the legal baseline changes.
#
# Target audience: Russia-related deployments. Roskomnadzor (supervisory authority); operator
# (personal-data controller) concepts under 152-FZ. Terms: Russian + English.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-russia_152_fz.yaml
#        ml_patterns_file: path/to/compliance-sample-russia_152_fz.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Federal Law No. 152-FZ "On Personal Data"; key amendments: Federal Law No. 266-FZ (2022) —
# strengthened Roskomnadzor powers, mandatory breach notification (72 h initial / 5 days detailed),
# tighter cross-border transfer rules (Art. 12), expanded localization requirement (Art. 22.1).
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - Data Boar performs technical pattern and term matching only. It does NOT classify processing
#     bases, evaluate localization compliance, or assess breach notification timelines. Use output
#     as inventory signal; scope determination with counsel.
#
# Regex notes:
#   - SNILS_RU (insurance number): formatted XXX-XXX-XXX XX — relatively distinctive in context.
#   - INN_RU_LEGAL_ENTITY_HEURISTIC (10-digit): first digit 7–9 heuristic for domestic legal-entity
#     INNs; expect false positives on arbitrary 10-digit numbers — tune or disable if noisy.
#   - INN_RU_INDIVIDUAL: 12-digit individual taxpayer number (физическое лицо).
#   - SNILS_RU_PLAIN: SNILS without hyphens (display variant XXXXXXXXXXX 11 digits).
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml. Geolocation data that identifies a Russian citizen may
#     constitute personal data under 152-FZ Art. 3. Patterns are heuristic signals only.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  - name: "SNILS_RU"
    # SNILS (Страховой номер индивидуального лицевого счёта): NNN-NNN-NNN NN
    pattern: "\\b\\d{3}-\\d{3}-\\d{3}\\s\\d{2}\\b"
    norm_tag: "Russia 152-FZ"
  - name: "SNILS_RU_PLAIN"
    # SNILS without delimiters (11 digits): used in some DB storage formats
    pattern: "\\b\\d{11}\\b"
    norm_tag: "Russia 152-FZ"
  - name: "INN_RU_LEGAL_ENTITY_HEURISTIC"
    # INN legal entity (ИНН юридического лица): 10-digit heuristic (first digit 7–9 for domestic)
    pattern: "\\b[789]\\d{9}\\b"
    norm_tag: "Russia 152-FZ"
  - name: "INN_RU_INDIVIDUAL"
    # INN individual (ИНН физического лица): 12 digits
    pattern: "\\b\\d{12}\\b"
    norm_tag: "Russia 152-FZ"
  # Precise geolocation (152-FZ Art. 3 — location data identifying a Russian citizen = personal data)
  - name: "RU_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Russia 152-FZ"
  - name: "RU_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Russia 152-FZ"
  - name: "RU_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Russia 152-FZ"
  - name: "RU_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Russia 152-FZ"

