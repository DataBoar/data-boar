# APPI – sample compliance profile (Japan; Act on the Protection of Personal Information)
#
# Target audience: Japan and APAC deployments. ML terms in English and Japanese (個人情報,
# 要配慮個人情報, 保有個人データ) so column names in either language are detected.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-appi.yaml
#        ml_patterns_file: path/to/compliance-sample-appi.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# APPI: Personal Information Protection Commission (PPC); Act on the Protection of Personal
# Information (個人情報の保護に関する法律); last major revision effective April 2022.
# Key categories: "personal information" (個人情報; Art. 2), "sensitive personal information"
# requiring special care (要配慮個人情報; Art. 2(3) / Art. 17), "retained personal data"
# (保有個人データ; Art. 2(7)).
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - APPI requires personal information handlers (個人情報取扱事業者) to specify purpose of
#     use and obtain consent for sensitive categories. Cross-border transfer rules changed in
#     the 2022 revision (Art. 24).
#   - Data Boar performs technical pattern and term matching only. It does NOT classify
#     purpose of use, evaluate consent, or apply 2022 transfer rules. Use output as inventory
#     signal; scope determination with counsel.
#
# Regex design:
#   - MY_NUMBER_JP: 12-digit Japanese Individual Number (マイナンバー; Act on Use of Numbers
#     to Identify a Specific Individual in Administrative Procedures).
#   - JP_POSTAL: Japanese postal code (〒NNN-NNNN or NNNNNNN).
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml. The PPC has confirmed location data (位置情報) that
#     identifies an individual constitutes "personal information" under APPI Art. 2. Patterns
#     are heuristic coordinate-shape signals only — not automatic PPC classification.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  - name: "MY_NUMBER_JP"
    # Japanese Individual Number (マイナンバー): 12 digits, optionally spaced in groups of 4
    pattern: "\\b\\d{4}\\s?\\d{4}\\s?\\d{4}\\b"
    norm_tag: "APPI"
  - name: "JP_POSTAL"
    # Japanese postal code: NNN-NNNN or NNNNNNN; often prefixed with 〒 in display
    pattern: "\\b\\d{3}-?\\d{4}\\b"
    norm_tag: "APPI"
  # Precise geolocation (位置情報 — PPC clarification: identifies an individual → personal info)
  - name: "APPI_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "APPI"
  - name: "APPI_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "APPI"
  - name: "APPI_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "APPI"
  - name: "APPI_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "APPI"

# ML terms: English and Japanese.
# 個人情報 = personal information; 要配慮個人情報 = sensitive personal information (special care);
# 保有個人データ = retained personal data; 本人 = data subject / individual;
# 氏名 = name; 住所 = address; 電話番号 = phone number; 生年月日 = date of birth;
# 位置情報 = location information; 病歴 = medical history; 人種 = race; 信条 = creed/belief;
# マイナンバー = My Number (individual number); 利用目的 = purpose of use.
