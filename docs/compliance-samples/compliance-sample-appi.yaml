recommendation_overrides:
  - norm_tag_pattern: "APPI"
    base_legal: "APPI (個人情報の保護に関する法律); PPC — Personal Information Protection Commission; 2022 revision"
    risk: "Personal information or sensitive personal information (要配慮個人情報) in scope of APPI. Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only — not an automatic PPC classification. Cross-border transfer rules (Art. 24, 2022 revision) may apply when data leaves Japan."
    recommendation: "Verify personal-information handler (個人情報取扱事業者) obligations; specify purpose of use (利用目的); obtain consent for sensitive categories; confirm cross-border transfer safeguards (Art. 24); consider PPC voluntary annual audit alignment."
    priority: "ALTA"
    relevant_for: "DPO, Personal Information Protection Commission (PPC), Legal, Information Security"
