recommendation_overrides:
  - norm_tag_pattern: "CPRA"
    base_legal: "California Privacy Rights Act (CPRA) / CCPA; Cal. Civ. Code § 1798.100 et seq.; CPPA rulemaking"
    risk: "Possible sensitive personal information (SPI) under CPRA § 1798.140(ae) — including precise geolocation, biometric, health, racial/ethnic origin, financial credentials, or communications content. Precise geolocation regex signals are heuristic only; not an automatic SPI legal determination."
    recommendation: "Confirm SPI category, purpose, and opt-out or consent requirements with California privacy counsel; document data mapping and CPPA filing obligations; verify precise-geolocation threshold (< 1852 m) with your data architecture team."
    priority: "ALTA"
    relevant_for: "DPO, California privacy counsel, CPPA, Information Security, Product"
  - norm_tag_pattern: "CCPA"
    base_legal: "California Consumer Privacy Act (CCPA) / CPRA; Cal. Civ. Code § 1798.100 et seq."
    risk: "Personal information of California consumers in scope of CCPA (as amended by CPRA); B2B and employment exemptions are not evaluated by the scanner."
    recommendation: "Verify consumer context and applicable exemptions with counsel; maintain records of processing and consumer rights requests (access, delete, correct, opt-out)."
    priority: "ALTA"
    relevant_for: "DPO, California privacy counsel, CPPA, Information Security"
