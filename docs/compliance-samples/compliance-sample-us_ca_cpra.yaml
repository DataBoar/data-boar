# California Privacy Rights Act (CPRA) / CCPA – sample compliance profile
#
# Target audience: U.S. California deployments; DPOs and privacy engineers aligning inventory
# language with the California Consumer Privacy Act (Cal. Civ. Code § 1798.100 et seq.) as
# amended and expanded by the California Privacy Rights Act (Proposition 24, 2020). Enforced
# by the California Privacy Protection Agency (CPPA) from 2023.
#
# Relationship with built-in defaults:
#   This sample includes the same CCPA_SSN regex as the app's core DEFAULT_PATTERNS (so using
#   this file as regex_overrides_file does not reduce coverage), plus additional California-
#   specific sensitive personal information (SPI) patterns and terms from CPRA (§ 1798.140(ae)).
#   ML terms are tuned for California consumer-context vocabulary.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-us_ca_cpra.yaml
#        ml_patterns_file: path/to/compliance-sample-us_ca_cpra.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - CCPA/CPRA applies to certain businesses collecting personal information of California
#     consumers. Statutory text, CPPA rulemaking, and case law continuously evolve.
#   - Data Boar performs technical pattern and term matching only. It does NOT classify B2B
#     vs consumer data, apply exemptions, or evaluate opt-out validity. Use output as
#     inventory signal; scope with counsel.
#
# Regex design:
#   - CCPA_SSN: built-in pattern (SSN ddd-dd-dddd) carried here for explicit documentation
#     and so operators can tune norm_tag or disable without touching detector.py.
#   - DL_CA: California driver license format (1 letter + 7 digits) per CPRA SPI definition.
#   - ITIN: individual taxpayer ID — commonly used by non-SSN holders in California.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml; CPRA § 1798.140(ae)(1)(H) lists precise geolocation
#     (< 1852 m) as sensitive personal information. Heuristic only — not an automatic SPI
#     legal determination; confirm with counsel.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  # Built-in equivalent — explicit here so operators can tune or document
  - name: "CCPA_SSN"
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    norm_tag: "CCPA"
  # California SPI identifiers (CPRA § 1798.140(ae))
  - name: "CPRA_CA_DL"
    # California driver license: letter + 7 digits (e.g. A1234567)
    pattern: "\\b[A-Z]\\d{7}\\b"
    norm_tag: "CPRA"
  - name: "CPRA_ITIN"
    # U.S. Individual Taxpayer Identification Number: 9XX-7X-XXXX format
    pattern: "\\b9\\d{2}-[7-9]\\d-\\d{4}\\b"
    norm_tag: "CPRA"
  # Precise geolocation (CPRA § 1798.140(ae)(1)(H); < 1852 m radius threshold)
  - name: "CPRA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "CPRA"
  - name: "CPRA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "CPRA"
  - name: "CPRA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "CPRA"
  - name: "CPRA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "CPRA"

