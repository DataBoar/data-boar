# Philippines DPA – sample compliance profile (Data Privacy Act 2012, RA 10173)
#
# Target audience: Philippines deployments and Southeast Asia regional compliance.
# National Privacy Commission (NPC); Personal Information Controller (PIC) /
# Personal Information Processor (PIP) concepts.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-philippines_dpa.yaml
#        ml_patterns_file: path/to/compliance-sample-philippines_dpa.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Legal scope:
#   - Republic Act 10173 (Data Privacy Act 2012, DPA 2012), in force 8 March 2012;
#     Implementing Rules and Regulations (IRR) issued 2016.
#   - Regulator: National Privacy Commission (NPC).
#   - Key NPC circulars: NPC 16-01 (security of personal data), NPC 16-02 (data sharing
#     agreements), NPC 16-03 (data breach notification — 72 h to NPC, plus notification
#     to data subjects without undue delay).
#   - Sensitive personal information (SPI, s.3(l)): race, ethnic origin, marital status,
#     age, colour, religious, philosophical or political affiliation, health, education,
#     genetic or sexual life, criminal proceedings and convictions, government-issued IDs
#     (SSS, GSIS, TIN, PHILHEALTH, Unified Multi-Purpose ID / PhilSys / National ID).
#   - Registration: PICs and PIPs processing SPI at scale must register with NPC.
#   - DPA 2012 is broadly modelled on EU Directive 95/46/EC; partial GDPR convergence
#     ongoing. NPC has not formally issued an adequacy decision list; cross-border
#     transfers require contractual safeguards or NPC approval.
#   - PhilSys (Philippine Identification System) / National ID (Republic Act 11055):
#     12-digit PhilSys Number (PSN); biometric data stored in central registry.
#   - The scanner does not evaluate NPC registration status, contract adequacy, or
#     cross-border transfer approvals. Use output as inventory signal; scope with
#     Philippine privacy counsel.
#
# Regex design:
#   - PH_SSS_ID: Social Security System number — XX-XXXXXXX-X (10 digits, hyphens optional).
#   - PH_GSIS_ID: Government Service Insurance System ID — XXXX-XXXX-XXXX (12 digits).
#   - PH_TIN: Bureau of Internal Revenue Taxpayer ID — XXX-XXX-XXX(-XXXX) (9-13 digits).
#   - PH_PHILSYS: PhilSys National ID — 12-digit numeric string (PSN). May overlap with
#     other 12-digit IDs; triage with field name context.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml.
#     Location data is personal information under DPA 2012 s.3(g) (information about an
#     identifiable natural person).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "PH_SSS_ID"
    # SSS number: XX-XXXXXXX-X (10 digits, hyphens optional)
    pattern: "\\b\\d{2}-?\\d{7}-?\\d\\b"
    norm_tag: "Philippines DPA"
  - name: "PH_GSIS_ID"
    # GSIS ID: XXXX-XXXX-XXXX (12 digits, hyphens optional)
    pattern: "\\b\\d{4}-?\\d{4}-?\\d{4}\\b"
    norm_tag: "Philippines DPA"
  - name: "PH_TIN"
    # BIR Tax Identification Number: XXX-XXX-XXX or XXX-XXX-XXX-XXXX
    pattern: "\\b\\d{3}-\\d{3}-\\d{3}(?:-\\d{4})?\\b"
    norm_tag: "Philippines DPA"
  - name: "PH_PHILSYS"
    # PhilSys National ID (PSN): 12 digits, plain string
    pattern: "\\b\\d{12}\\b"
    norm_tag: "Philippines DPA"
  # Precise geolocation (DPA 2012 s.3(g) — identifiable location = personal information)
  - name: "PH_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Philippines DPA"
  - name: "PH_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Philippines DPA"
  - name: "PH_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Philippines DPA"
  - name: "PH_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Philippines DPA"

