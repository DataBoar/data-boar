recommendation_overrides:
  - norm_tag_pattern: "Philippines DPA"
    base_legal: "Data Privacy Act 2012 (RA 10173); NPC Implementing Rules and Regulations 2016; NPC Circular 16-03 (72-hour breach notification)"
    risk: "Personal information and sensitive personal information (SPI) under DPA 2012. SPI categories: race, ethnic origin, marital status, religious/political affiliation, health, genetic, sexual life, criminal record, government-issued IDs (SSS, GSIS, TIN, PHILHEALTH, PhilSys/National ID). Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only. NPC registration required for large-scale SPI processors. Cross-border transfers require contractual safeguards or NPC approval."
    recommendation: "Comply with DPA 2012 data life cycle principles (collection, processing, storage, use, disposal); obtain valid consent or other legal basis for SPI; register with NPC when required; notify NPC within 72 hours and data subjects without undue delay on breach (NPC Circular 16-03); ensure cross-border transfer safeguards; execute data sharing agreements per NPC Circular 16-02."
    priority: "ALTA"
    relevant_for: "DPO, PIC, PIP, National Privacy Commission, Legal"
