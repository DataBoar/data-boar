recommendation_overrides:
  - norm_tag_pattern: "New Zealand Privacy"
    base_legal: "Privacy Act 2020 (NZ); Office of the Privacy Commissioner (OPC); in force 1 December 2020"
    risk: "Personal information subject to 13 Information Privacy Principles (IPPs). Notifiable Privacy Breach (NPB) regime requires notification to OPC and affected individuals for breaches likely to cause serious harm. High-sensitivity categories (health, genetic, biometric, sexual orientation, ethnicity, financial, criminal) identified per OPC guidance and Human Rights Act 1993. Precise coordinate-shaped values are heuristic inventory signals only."
    recommendation: "Comply with 13 IPPs (collection, use, storage, disclosure, unique identifiers, correction, trans-border flows); notify OPC and affected individuals of notifiable privacy breaches as soon as practicable; assess trans-border transfer safeguards (IPP 12 — comparable protections); conduct Privacy Impact Assessments for high-risk processing; engage OPC guidance for health, children, and biometric data handling."
    priority: "ALTA"
    relevant_for: "Privacy Officer, DPO, OPC, Legal, Information Security"
