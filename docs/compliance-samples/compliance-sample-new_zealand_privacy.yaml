# New Zealand Privacy Act – sample compliance profile (Privacy Act 2020, OPC)
#
# Target audience: New Zealand deployments and Oceania-regional compliance.
# Office of the Privacy Commissioner (OPC); privacy breach notification (NPC).
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-new_zealand_privacy.yaml
#        ml_patterns_file: path/to/compliance-sample-new_zealand_privacy.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Legal scope:
#   - Privacy Act 2020 (NZ), in force 1 December 2020; supersedes Privacy Act 1993.
#   - Regulator: Office of the Privacy Commissioner (OPC).
#   - 13 Information Privacy Principles (IPPs) govern collection, use, storage, and disclosure.
#   - Notifiable Privacy Breach (NPB) regime: agencies must notify OPC and affected individuals
#     of privacy breaches likely to cause serious harm (Part 7, Privacy Act 2020). No fixed
#     hour threshold — notification "as soon as practicable."
#   - Trans-border data flows: agency must not transfer personal information outside NZ unless
#     the destination provides comparable privacy safeguards (IPP 12), or other exceptions apply.
#   - Sensitive categories: Privacy Act 2020 does not enumerate a closed list of "sensitive"
#     categories; sensitivity is assessed by context and degree of harm if disclosed. Health,
#     genetic, biometric, sexual orientation, ethnicity, religion, and financial data are
#     treated as high-sensitivity in OPC guidance and Human Rights Act 1993 overlay.
#   - Children: Privacy Act 2020 applies to all natural persons regardless of age. Additional
#     protections apply under the Children's Act 2014 and Education sector rules.
#   - The scanner does not evaluate IPP compliance or serious-harm thresholds. Use output as
#     inventory signal; scope with NZ privacy counsel.
#
# Regex design:
#   - IRD_NZ: Inland Revenue Department (IRD) tax number — 8 or 9 digits, hyphens optional
#     (format XX-XXX-XXX or XXX-XXX-XXX). Stored as 8-9 digit plain strings.
#   - NHI_NZ: National Health Index number — 3 uppercase letters + 4 digits (e.g. ABC1234).
#     High relevance in health sector; OPC guidance treats NHI as personal information.
#   - NZ_PASSPORT: NZ passport — 2 uppercase letters + 6 digits (e.g. LH123456).
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml.
#     Location data is personal information under Privacy Act 2020 s.7 (any information
#     about an identifiable individual).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "IRD_NZ"
    # NZ IRD number: 8-9 digits, hyphens optional (XX-XXX-XXX or XXX-XXX-XXX)
    pattern: "\\b\\d{2,3}-?\\d{3}-?\\d{3}\\b"
    norm_tag: "New Zealand Privacy"
  - name: "NHI_NZ"
    # National Health Index: 3 uppercase letters + 4 digits
    pattern: "\\b[A-Z]{3}\\d{4}\\b"
    norm_tag: "New Zealand Privacy"
  - name: "NZ_PASSPORT"
    # NZ passport: 2 uppercase letters + 6 digits
    pattern: "\\b[A-Z]{2}\\d{6}\\b"
    norm_tag: "New Zealand Privacy"
  # Precise geolocation (Privacy Act 2020 s.7 — identifiable location = personal information)
  - name: "NZ_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "New Zealand Privacy"
  - name: "NZ_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "New Zealand Privacy"
  - name: "NZ_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "New Zealand Privacy"
  - name: "NZ_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "New Zealand Privacy"

