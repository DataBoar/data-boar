# Ukraine Personal Data Protection – sample compliance profile
#
# Target audience: Ukrainian deployments; organisations processing personal data of
# Ukrainian citizens or operating in Ukraine. Uповноважений Верховної Ради України з
# прав людини (Ukrainian Parliament Commissioner for Human Rights — DPA).
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-ukraine_pdp.yaml
#        ml_patterns_file: path/to/compliance-sample-ukraine_pdp.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Legal scope:
#   - Law of Ukraine on Personal Data Protection No. 2297-VI (2010), as amended.
#     Original baseline aligned with EU Directive 95/46/EC; ongoing legislative
#     convergence towards GDPR since Ukraine obtained EU candidate status (June 2022).
#   - Key amendments: Law 3454-IX (2023) — breach notification obligations (72 h to DPA);
#     Law 2782-IX (2023) — expansion of data subject rights consistent with GDPR Ch. III.
#   - Sensitive data categories (Article 7): racial/ethnic origin, political views,
#     religious/philosophical beliefs, trade union membership, health, sexual life,
#     biometric data, genetic data, criminal record.
#   - Cross-border transfer: permitted to countries on approved list or with adequate
#     safeguards (analogous to GDPR standard contractual clauses).
#   - Wartime context (2022-present): martial law regulations affect certain processing
#     activities; state security exceptions are broad. Use output as inventory signal only;
#     scope with Ukrainian legal counsel.
#
# Regex design:
#   - UA_IPN: Individual taxpayer number (ідентифікаційний номер платника податків);
#     10-digit numeric string; issued by the State Tax Service of Ukraine.
#   - UA_PASSPORT_BIOMETRIC: Biometric passport number; 2 uppercase letters + 6 digits (e.g. FN123456).
#   - UA_PASSPORT_LEGACY: Legacy internal passport series/number: 2 Cyrillic letters + 6 digits.
#     Note: Cyrillic letters in data may appear romanised; both patterns included.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and other enriched samples. Location data is personal data under Art. 2 (identifier).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "UA_IPN"
    # Ukrainian taxpayer number: 10 digits, first digit non-zero
    pattern: "\\b[1-9]\\d{9}\\b"
    norm_tag: "Ukraine PDP"
  - name: "UA_PASSPORT_BIOMETRIC"
    # Biometric passport: 2 uppercase ASCII letters + 6 digits (e.g. FN123456)
    pattern: "\\b[A-Z]{2}\\d{6}\\b"
    norm_tag: "Ukraine PDP"
  - name: "UA_PASSPORT_LEGACY"
    # Legacy internal passport (до 2015): 2 Cyrillic uppercase letters + 6 digits
    # Cyrillic range А–Я (U+0410–U+042F); also catches romanised variants via UA_PASSPORT_BIOMETRIC
    pattern: "\\b[\\u0410-\\u042F]{2}\\d{6}\\b"
    norm_tag: "Ukraine PDP"
  # Precise geolocation (Art. 2 Law 2297-VI — location data identifying a natural person = personal data)
  - name: "UA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Ukraine PDP"
  - name: "UA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Ukraine PDP"
  - name: "UA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Ukraine PDP"
  - name: "UA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Ukraine PDP"

