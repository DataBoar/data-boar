recommendation_overrides:
  - norm_tag_pattern: "Ukraine PDP"
    base_legal: "Law of Ukraine on Personal Data Protection No. 2297-VI (2010, as amended 2023); DPA: Uповноважений Верховної Ради України з прав людини (Ukrainian Parliament Commissioner for Human Rights); GDPR-convergent direction under EU candidacy (June 2022)"
    risk: "Personal data under Ukrainian law, including sensitive categories (health, biometric, genetic, racial/ethnic origin, criminal record). Breach notification obligations apply (72 h to DPA under 2023 amendments). Coordinate-shaped values in logs/APIs are heuristic inventory signals only — not automatic legal classification. Cross-border transfer restrictions apply; martial law context (2022-present) creates additional regulatory uncertainty — scope with Ukrainian legal counsel."
    recommendation: "Ensure lawful basis for processing; notify DPA within 72 h of breach (Law 3454-IX 2023); apply GDPR-aligned data subject rights (access, erasure, portability) per 2023 amendments; confirm cross-border transfer safeguards; maintain a register of processing activities; assess impact of martial law data processing exceptions with counsel."
    priority: "ALTA"
    relevant_for: "DPO, Legal, Information Security, Ukrainian Ombudsman compliance"
