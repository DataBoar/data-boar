recommendation_overrides:
  - norm_tag_pattern: "Ukraine PDP"
    base_legal: "Law of Ukraine on Personal Data Protection No. 2297-VI (2010, as amended 2023); DPA: Уповноважений Верховної Ради України з прав людини (Ukrainian Parliament Commissioner for Human Rights); GDPR-convergent amendments: Law 3454-IX (2023 — 72 h breach notification), Law 2782-IX (2023 — GDPR Ch. III rights); EU candidate status since June 2022"
    risk: "Personal data under Ukrainian law, including sensitive categories (Art. 7: health, biometric, genetic, racial/ethnic origin, trade union membership, sexual life, criminal record). Breach notification to the DPA required within 72 hours (Law 3454-IX 2023). Coordinate-shaped values in logs/APIs are heuristic inventory signals only — not automatic legal classification. Cross-border transfer restrictions apply (approved country list or adequate safeguards). Martial law context (2022-present) expands state security exceptions — scope all processing with Ukrainian legal counsel."
    recommendation: "Establish lawful basis for processing (consent, legitimate interest, legal obligation); notify DPA within 72 h of breach (Law 3454-IX 2023) and affected data subjects without undue delay; apply GDPR-aligned rights: access, erasure, portability, restriction, objection, automated-decision review (Laws 2782-IX 2023); maintain ROPA (register of processing activities) covering all operations; conduct DPIA for high-risk processing, profiling, and systematic monitoring; appoint DPO if processing is large-scale or involves sensitive categories; confirm cross-border transfer safeguards (standard contractual clauses or approved country list); assess applicability of martial law data processing exceptions with qualified Ukrainian legal counsel."
    priority: "ALTA"
    relevant_for: "DPO, Legal, Information Security, Ukrainian Ombudsman compliance, EU data protection teams handling Ukraine-based data subjects"
