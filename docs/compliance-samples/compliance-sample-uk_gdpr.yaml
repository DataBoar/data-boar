# UK GDPR – sample compliance profile (UK post-Brexit + EU-like)
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-uk_gdpr.yaml
#        ml_patterns_file: path/to/compliance-sample-uk_gdpr.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# This file uses keys "regex" and "terms" so the same file can be used for both regex_overrides_file and
# ml_patterns_file. Paths are typically relative to the working directory or absolute.

# Custom regex patterns; matches get norm_tag "UK GDPR" in the report.
# Use double-quoted YAML with escaped backslashes (\\b, \\s, \\d) so linters and loaders accept; value is literal \b \s \d for regex.
#
# Precise geolocation (logs / APIs): same regex geometry as compliance-sample-us_va_vcdpa.yaml and
# compliance-sample-eu_gdpr.yaml (JSON lat/lng, location: pair, latitude=&longitude=). norm_tag stays
# "UK GDPR" for UK inventory. Heuristic only — not an ICO or lawful-basis determination.

regex:
  - name: "UK_NIN"
    pattern: "\\b[A-Z]{2}\\s?\\d{6}\\s?[A-D]\\b"
    norm_tag: "UK GDPR"
  - name: "UK_NINO_ALT"
    pattern: "\\b[A-Z]{2}\\s?\\d{2}\\s?\\d{2}\\s?\\d{2}\\s?\\d{2}\\s?[A-D]\\b"
    norm_tag: "UK GDPR"
  - name: "UK_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "UK GDPR"
  - name: "UK_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "UK GDPR"
  - name: "UK_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "UK GDPR"
  - name: "UK_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "UK GDPR"

