    base_legal: "UK GDPR Art. 4(1); ICO guidance"
    risk: "Identification of data subject; possible precise geolocation or biometric-adjacent fields in logs/APIs (heuristic regex only — not an ICO classification)."
    recommendation: "Apply UK GDPR safeguards; consider DPA registration with ICO if required; where location tracking applies, confirm lawful basis and record DPIA decisions with counsel."
    priority: "ALTA"
    relevant_for: "DPO, UK Representative, ICO"
