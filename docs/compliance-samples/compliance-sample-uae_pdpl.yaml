recommendation_overrides:
  - norm_tag_pattern: "UAE PDPL"
    base_legal: "Federal Decree-Law No. 45 of 2021 on the Protection of Personal Data (UAE PDPL); UAE Data Office (UAEDO / TDRA); Cabinet Regulations 2023. Free Zone note: DIFC uses DP Law 2020 and ADGM uses DP Regulations 2021 — each is a separate regime; verify applicable framework with UAE counsel."
    risk: "Personal data and sensitive data categories (race/ethnic origin, religion, political opinion, criminal record, health/medical, biometric, genetic, financial/credit, children's data) under UAE PDPL. Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only — not automatic legal classification. Cross-border transfers require UAEDO-approved destination or contractual safeguards. Breach notification obligations apply on discovery of significant-risk incidents."
    recommendation: "Identify lawful basis for each processing activity; obtain explicit consent for sensitive data categories; register with UAE Data Office if required; notify UAEDO without undue delay on significant data breach; confirm cross-border transfer safeguards; verify whether DIFC or ADGM Free Zone rules apply in parallel; apply data minimisation and purpose limitation."
    priority: "ALTA"
    relevant_for: "DPO, UAE Data Office, Data Controller, Legal, Compliance Officer (DIFC/ADGM where applicable)"
