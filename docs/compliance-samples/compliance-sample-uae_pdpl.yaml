# UAE PDPL – sample compliance profile
#
# Target audience: UAE deployments and Middle East regional compliance.
# UAE Data Office (مكتب حماية البيانات الإماراتي).
# Terms: EN + Arabic (بيانات شخصية / بيانات حساسة) for column names in Arabic-language data.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-uae_pdpl.yaml
#        ml_patterns_file: path/to/compliance-sample-uae_pdpl.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Legal scope:
#   - Federal Decree-Law No. 45 of 2021 on the Protection of Personal Data (UAE PDPL);
#     in force 2 January 2022. Implementing Regulations issued by Cabinet Resolution in 2023.
#   - Regulator: UAE Data Office (UAEDO), part of the Telecommunications and Digital
#     Government Regulatory Authority (TDRA).
#   - Sensitive data categories (Art. 2 / Regulations): racial/ethnic origin, religion,
#     political/philosophical opinions, criminal record, health/medical data, biometric data,
#     genetic data, credit/financial data, children's data.
#   - Cross-border transfer: permitted to countries on UAEDO approved list, or via controller
#     contract with adequate safeguards (equivalent to GDPR standard contractual clauses).
#   - Breach notification: controller must notify UAEDO "without undue delay" after becoming
#     aware of a breach involving significant risk; no fixed statutory hour threshold in the
#     Decree-Law text (regulations apply operational specifics — verify current guidance).
#   - Free Zones (e.g. DIFC, ADGM): each has its own data protection regime. DIFC uses
#     DP Law 2020 (GDPR-aligned); ADGM uses DP Regulations 2021. This sample covers the
#     Federal PDPL only. Free Zone operators should use the relevant Free Zone sample or
#     apply Free Zone rules alongside Federal PDPL.
#   - The scanner does not evaluate Free Zone applicability, cross-border adequacy decisions,
#     or UAEDO registration status. Use output as inventory signal; scope with UAE counsel.
#
# Regex design:
#   - UAE_ID: Emirates ID number; format 784-YYYY-NNNNNNN-C (784 = UAE country code,
#     YYYY = birth year, 7-digit serial, 1 check digit). Hyphens optional in stored data.
#   - UAE_PASSPORT_ALT: Heuristic; 1-2 uppercase letters + 6-9 digits. High FP rate;
#     triage with surrounding field context.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml.
#     Location data is personal data under UAE PDPL Art. 2 (identifier).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "UAE_ID"
    # Emirates ID: 784-YYYY-NNNNNNN-C; hyphens optional
    pattern: "\\b784-?\\d{4}-?\\d{7}-?\\d\\b"
    norm_tag: "UAE PDPL"
  - name: "UAE_PASSPORT_ALT"
    # Heuristic passport; triage with context (high FP)
    pattern: "\\b[A-Z]{1,2}\\d{6,9}\\b"
    norm_tag: "UAE PDPL"
  # Precise geolocation (UAE PDPL Art. 2 — location identifier = personal data)
  - name: "UAE_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "UAE PDPL"
  - name: "UAE_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "UAE PDPL"
  - name: "UAE_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "UAE PDPL"
  - name: "UAE_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "UAE PDPL"

