# Brazil — FELCA (Lei 15.211/2025 — Estatuto Digital da Criança e do Adolescente)
# In force: 17 March 2026
#
# NOT LEGAL ADVICE. This file is a technical starting point for inventory and
# tagging of data fields that may relate to children and adolescents (menores de
# 18 anos) in the context of digital platforms subject to FELCA. It does NOT
# certify compliance, implement age verification, or replace DPO / legal counsel.
#
# Scope: FELCA applies to digital platforms directed at or accessible by minors
# in Brazil. The engine supports discovery and mapping only — consent workflows,
# parental verification, and platform-control requirements must be addressed by
# DPO/legal teams independently of scan findings.
#
# Pair with: compliance-sample-lgpd.yaml for full Brazilian PII coverage.
# Authority: ANPD (Autoridade Nacional de Proteção de Dados)
# Reference: Lei 15.211/2025 — planalto.gov.br
#
# How to use:
#   regex_overrides_file: path/to/compliance-sample-brazil_felca.yaml
#   ml_patterns_file:     path/to/compliance-sample-brazil_felca.yaml
#   Merge recommendation_overrides into report.recommendation_overrides.
#
# Token-aware note: use session token `compliance` or `felca` to bind
# this sample in a Cursor / Composer 2 fresh thread before editing.

regex:
  # --- Age / date-of-birth signals that may indicate minors ---
  - name: "FELCA_DOB_FIELD_LABEL"
    # Column or field names explicitly referencing birth date of a child context.
    # Heuristic: flag for DPO review; not all DOB fields belong to minors.
    pattern: "(?i)\\b(data[_\\s-]?nasc(?:imento)?|nascimento|birth[_\\s-]?date|dob|date[_\\s-]?of[_\\s-]?birth)\\b"
    norm_tag: "FELCA Art. 14 (dado de menor)"

  - name: "FELCA_AGE_FIELD_LABEL"
    # Column or field names for age — may indicate minor-related processing.
    pattern: "(?i)\\b(idade|age|anos[_\\s]?completados|years[_\\s]?old)\\b"
    norm_tag: "FELCA Art. 14 (dado de menor)"

  - name: "FELCA_MINOR_INDICATOR_BOOLEAN"
    # Boolean / flag columns explicitly marking minor status.
    pattern: "(?i)\\b(is[_\\s]?minor|eh[_\\s]?menor|menor[_\\s]?de[_\\s]?idade|underage|crianca[_\\s]?flag|menor[_\\s]?flag)\\b"
    norm_tag: "FELCA Art. 14 (dado de menor)"

  - name: "FELCA_PARENTAL_CONSENT_FIELD"
    # Fields capturing parental consent — core FELCA requirement.
    pattern: "(?i)\\b(consentimento[_\\s]?parental|consentimento[_\\s]?responsavel|parental[_\\s]?consent|guardian[_\\s]?consent|responsible[_\\s]?consent|autoriza[cç][aã]o[_\\s]?responsavel)\\b"
    norm_tag: "FELCA Art. 14 (consentimento responsável)"

  - name: "FELCA_GUARDIAN_FIELD"
    # Fields for parent / legal guardian data.
    pattern: "(?i)\\b(responsavel[_\\s]?legal|nome[_\\s]?responsavel|parent[_\\s]?name|guardian[_\\s]?name|mae|pai|nome[_\\s]?mae|nome[_\\s]?pai|mother[_\\s]?name|father[_\\s]?name)\\b"
    norm_tag: "FELCA Art. 14 (dado de responsável)"

  - name: "FELCA_SCHOOL_ENROLLMENT"
    # School enrollment / class identifiers common in EdTech platforms.
    pattern: "(?i)\\b(matricula[_\\s]?escolar|numero[_\\s]?matricula|student[_\\s]?id|school[_\\s]?id|turma|serie[_\\s]?escolar|grade[_\\s]?level|ano[_\\s]?escolar|class[_\\s]?id|classroom[_\\s]?id)\\b"
    norm_tag: "FELCA Art. 14 (dado educacional de menor)"

  - name: "FELCA_CHILD_PROFILE_FIELD"
    # Profile-type fields specific to child accounts.
    pattern: "(?i)\\b(perfil[_\\s]?crianca|child[_\\s]?profile|kid[_\\s]?account|conta[_\\s]?menor|perfil[_\\s]?menor|junior[_\\s]?account)\\b"
    norm_tag: "FELCA Art. 14 (dado de menor)"

