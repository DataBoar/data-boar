recommendation_overrides:
  - norm_tag_pattern: "FELCA Art. 14 (consentimento responsável)"
    base_legal: "FELCA (Lei 15.211/2025) Art. 14 — consentimento parental verificável obrigatório para tratamento de dados de crianças e adolescentes em plataformas digitais. Em vigor desde 17/03/2026. Autoridade: ANPD."
    risk: "Campo captura ou referencia consentimento de responsável legal. FELCA exige que o consentimento seja verificável e documentado antes do tratamento de dados de menores."
    recommendation: "Verificar: (1) se há workflow de coleta e registro de consentimento verificável; (2) se dados de consentimento são auditáveis; (3) se há mecanismo de revogação. Consultar DPO e assessoria jurídica. Não tratar como atestado de conformidade."
    priority: "ALTA"
    relevant_for: "DPO, encarregado LGPD, jurídico, produto, ANPD"

  - norm_tag_pattern: "FELCA Art. 14 (dado educacional de menor)"
    base_legal: "FELCA (Lei 15.211/2025) + LGPD Art. 14 — dado educacional de menor em plataforma digital. Tratamento requer base legal e consentimento parental verificável. Em vigor desde 17/03/2026."
    risk: "Dados educacionais de menores (matrícula, turma, desempenho escolar) ampliam o perfil do menor — risco de reidentificação e uso indevido. Plataformas EdTech têm escrutínio elevado da ANPD."
    recommendation: "Verificar finalidade do tratamento, base legal aplicável (Art. 7 ou 11 LGPD + FELCA), retenção mínima e acesso restrito. Documentar no RoPA. Consultar DPO."
    priority: "ALTA"
    relevant_for: "DPO, encarregado LGPD, jurídico, produto, EdTech"

  - norm_tag_pattern: "FELCA Art. 14 (dado de responsável)"
    base_legal: "FELCA (Lei 15.211/2025) — dado de responsável legal coletado no contexto de plataforma digital com menores. LGPD Art. 5 (dado pessoal do responsável)."
    risk: "Dado do responsável legal coletado para fins de consentimento FELCA. Uso secundário ou compartilhamento não autorizado pode violar tanto a LGPD quanto o FELCA."
    recommendation: "Confirmar que o dado do responsável é coletado apenas para a finalidade de consentimento e não reutilizado para marketing ou compartilhado sem nova base legal. Consultar DPO."
    priority: "ALTA"
    relevant_for: "DPO, jurídico, produto, marketing"

  - norm_tag_pattern: "FELCA Art. 14 (dado de menor)"
    base_legal: "FELCA (Lei 15.211/2025) + LGPD Art. 14 — dado pessoal de criança ou adolescente em plataforma digital. Em vigor desde 17/03/2026. Autoridade fiscalizatória: ANPD."
    risk: "Dado relacionado a menor de idade em plataforma digital. FELCA impõe design adequado à criança, minimização de coleta, e limitações de uso para fins comerciais sem base legal qualificada."
    recommendation: "Avaliar: (1) necessidade e proporcionalidade da coleta; (2) existência de consentimento parental verificável; (3) adequação do design da plataforma (Art. 9 FELCA — design adequado); (4) vedações específicas (publicidade comportamental direcionada a menores). Consultar DPO e assessoria jurídica. Este inventário não substitui avaliação legal."
    priority: "ALTA"
    relevant_for: "DPO, encarregado LGPD, jurídico, produto, ANPD, conselho de administração"
