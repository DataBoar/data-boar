recommendation_overrides:
  - norm_tag_pattern: "POPIA"
    base_legal: "POPIA (Protection of Personal Information Act 4 of 2013); Information Regulator (South Africa); full enforcement from 1 July 2021"
    risk: "Personal information and special personal information (race, ethnic origin, religion, political persuasion, health, sexual life, biometric data, criminal behaviour) under POPIA. Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only — not automatic POPIA classification. Children's personal information (s.34) and cross-border transfers (s.72 — third-country adequacy) require heightened attention."
    recommendation: "Comply with the eight conditions for lawful processing; appoint an Information Officer; notify Information Regulator of security compromises; obtain prior authorisation for special personal information categories (s.27–32) where required; confirm cross-border transfer safeguards (s.72) with counsel; apply children's data obligations (s.34–35)."
    priority: "ALTA"
    relevant_for: "DPO, Information Officer, Information Regulator, Legal, Information Security"
