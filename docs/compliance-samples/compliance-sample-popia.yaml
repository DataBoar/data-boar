# POPIA – sample compliance profile (South Africa; Protection of Personal Information Act 4 of 2013)
#
# Target audience: South African deployments and POPIA compliance. Information Regulator
# (South Africa); responsible party / operator roles.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-popia.yaml
#        ml_patterns_file: path/to/compliance-sample-popia.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# POPIA: Protection of Personal Information Act 4 of 2013; Part B of Chapter 4 commenced
# 1 July 2020; full commencement 1 July 2021 (grace period ended). Enforcement by
# Information Regulator (South Africa) from 2021; major enforcement actions ongoing.
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - POPIA applies to responsible parties who process personal information in South Africa
#     or who use automated means in SA. Certain exemptions apply (e.g. household, journalistic,
#     judicial functions). The scanner does not evaluate exemptions or cross-border transfer
#     adequacy under s.72. Use output as inventory signal; scope with counsel.
#
# Regex design:
#   - SA_ID: South African national ID number (13 digits: YYMMDD + gender + citizenship + checksum).
#     Spaced variant covers "760101 5009 08 7" display format.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml. Location data that identifies a data subject is
#     personal information under POPIA s.1. Heuristic coordinate-shape signals only.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  - name: "SA_ID"
    # South African ID number displayed with spaces: YYMMDD GGGG CCC
    pattern: "\\b\\d{6}\\s?\\d{4}\\s?\\d{3}\\b"
    norm_tag: "POPIA"
  - name: "SA_ID_ALT"
    # SA ID number stored as plain 13-digit string
    pattern: "\\b\\d{13}\\b"
    norm_tag: "POPIA"
  # Precise geolocation (POPIA s.1 — location data identifying a data subject = personal information)
  - name: "POPIA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "POPIA"
  - name: "POPIA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "POPIA"
  - name: "POPIA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "POPIA"
  - name: "POPIA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "POPIA"

