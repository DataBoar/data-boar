recommendation_overrides:
  - norm_tag_pattern: "Thailand PDPA"
    base_legal: "Thailand Personal Data Protection Act B.E. 2562 (2019); Personal Data Protection Committee (PDPC) and implementing regulations."
    risk: "Personal and sensitive personal data; consent and legal bases; cross-border transfers; biometric, health, and precise geolocation inventory signals require governance alignment — exemptions and sector rules are not evaluated by the scanner."
    recommendation: "Map inventory to controller/processor roles under PDPA; maintain lawful bases and documentation for transfers; pair technical findings with Thai counsel on PDPC-facing posture."
    priority: "ALTA"
    relevant_for: "DPO, Privacy Counsel, PDPC liaison, Data Controller, Data Processor"
