recommendation_overrides:
  - norm_tag_pattern: "China PIPL"
    base_legal: "Personal Information Protection Law of the People's Republic of China (PIPL); enforcement and guidance via Cyberspace Administration of China (CAC) and related regulators; civil code and Cybersecurity Law may co-apply."
    risk: "Personal and sensitive personal information; contextual PRC ID card and Unified Social Credit Code patterns; coordinate-shaped fields as inventory signals only. Cross-border transfer, CII localization, children's PI, separate consent, and security assessment duties depend on facts and current CAC measures — not evaluated by the scanner."
    recommendation: "Map roles (processor / entrusted party); document purpose limitation and retention; assess cross-border mechanisms and storage location with PRC counsel; extend ML terms for product-specific column names in CN/EN mixed stacks."
    priority: "ALTA"
    relevant_for: "DPO, Legal, CAC-facing compliance, Product, Information Security, Data Localization"
