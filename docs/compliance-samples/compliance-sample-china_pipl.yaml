# China PIPL — sample compliance profile (Personal Information Protection Law)
#
# NOT LEGAL ADVICE. Technical inventory signals only. Implementing regulations, CAC
# practice, and sector measures under the PIPL and related laws evolve — revalidate
# with qualified PRC counsel.
#
# Target audience: Mainland China exposures; processors of personal information
# inside or outside China when activities relate to natural persons in China.
# Statute: Personal Information Protection Law (个人信息保护法), effective Nov 2021.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-china_pipl.yaml
#        ml_patterns_file: path/to/compliance-sample-china_pipl.yaml
#   2. Merge the recommendation_overrides list below into your config under
#      report.recommendation_overrides.
#
# Legal scope (summary):
#   - PIPL governs processing of personal information (个人信息) about identified or
#     identifiable natural persons within China, with extraterritorial reach in
#     prescribed circumstances. Sensitive categories (Art. 28), separate consent for
#     certain acts, cross-border transfers (Ch. III), and children's personal
#     information (Art. 31) carry high operational risk.
#   - Data Boar output is pattern and term matching only. It does not assess lawful
#     basis, separate consent validity, CII operator duties, security assessment
#     requirements for export, or localization obligations for critical operators.
#
# Regex design:
#   - CN_PRC_ID_CARD_CTX: 18-digit Mainland resident identity card number per GB 11643
#     shape (17 digits + checksum digit 0-9 or X); requires contextual labels
#     (Chinese or English) to reduce false positives on arbitrary 18-digit numbers.
#   - CN_USCC_CTX: Unified Social Credit Code (统一社会信用代码), 18 alphanumeric;
#     contextual prefix for enterprise registry exports.
#   - Precise geolocation: same four-decimal geometry as compliance-sample-us_va_vcdpa.yaml.
#
# Use double-quoted YAML with escaped backslashes. Chinese terms use UTF-8.

regex:
  - name: "CN_PRC_ID_CARD_CTX"
    pattern: "(?i)(?:\u8eab\u4efd\u8bc1|resident\\s+identity\\s+card|id\\s+card\\s*(?:no\\.?|number)?|national\\s+id)\\s*[:#]?\\s*\\b\\d{17}[0-9Xx]\\b"
    norm_tag: "China PIPL"
  - name: "CN_USCC_CTX"
    pattern: "(?i)(?:\u7edf\u4e00\u793e\u4f1a\u4fe1\u7528\u4ee3\u7801|unified\\s+social\\s+credit)\\s*[:#]?\\s*\\b[0-9A-Z]{18}\\b"
    norm_tag: "China PIPL"
  - name: "PIPL_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "China PIPL"
  - name: "PIPL_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "China PIPL"
  - name: "PIPL_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "China PIPL"
  - name: "PIPL_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "China PIPL"

