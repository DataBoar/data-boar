recommendation_overrides:
  - norm_tag_pattern: "LGPD Art. 5 (dado de saúde — CRM médico)"
    base_legal: "LGPD Art. 5, XI + Art. 11 — dados de saúde são dados sensíveis. CRM identifica o médico responsável por prescrições e procedimentos. CFM regulamenta o uso (prontuário eletrônico — resoluções aplicáveis em vigor)."
    risk: "Número de CRM vincula o médico a prescrições, atestados e procedimentos. Exposição pode facilitar fraudes em prescrições e violação do sigilo profissional. Dado de saúde sujeito a restrições reforçadas da LGPD Art. 11."
    recommendation: "Verificar base legal específica (LGPD Art. 11) para armazenamento de CRM em contexto de saúde. Aplicar controle de acesso restrito. Criptografar em repouso e em trânsito. Confirmar obrigações de retenção mínima. Consultar DPO, CISO e área jurídica. Não é conclusão legal."
    priority: "ALTA"
    relevant_for: "DPO, CISO, TI hospitalar, jurídico, farmácias, planos de saúde, representantes de medicamentos"

  - norm_tag_pattern: "LGPD Art. 5 (dado de saúde — CNS)"
    base_legal: "LGPD Art. 5, XI + Art. 11 — CNS identifica o paciente no SUS e ecossistema de dados em saúde. Dado sensível; portarias do Ministério da Saúde e marcos da RNDS aplicam-se ao processamento."
    risk: "CNS com 15 dígitos identifica o paciente no SUS. Exposição permite rastreamento de histórico clínico e atendimentos. Tratamento reforçado sob LGPD Art. 11."
    recommendation: "CNS não deve ser armazenado fora de sistemas de saúde autorizados sem base legal e governança explícitas. Verificar conformidade com normas de saúde digital vigentes. Aplicar criptografia e controle de acesso. Consultar DPO e área jurídica. Não é conclusão legal."
    priority: "CRÍTICA"
    relevant_for: "DPO, CISO, TI hospitalar, sistemas SUS, jurídico"

  - norm_tag_pattern: "LGPD Art. 5 (dado regulatório — ANVISA RMS)"
    base_legal: "RDCs e legislação sanitária — RMS identifica medicamentos registrados. LGPD aplica-se ao tratamento de dados pessoais no contexto clínico e comercial."
    risk: "RMS em bases de dispensação ou vendas pode, combinado com dados identificadores, vincular pacientes a medicamentos e condições de saúde. Em farmacovigilância, pode revelar contexto sensível (Art. 5, XI)."
    recommendation: "Avaliar contexto de uso do RMS. Quando associado a dados de paciente, tratar como dado de saúde (LGPD Art. 11). Verificar conformidade com rastreabilidade e normas ANVISA vigentes. Consultar DPO, jurídico e regulatório."
    priority: "MÉDIA"
    relevant_for: "DPO, área regulatória, CISO, indústria e distribuição farmacêutica"

  - norm_tag_pattern: "LGPD Art. 5 (dado de saúde — receituário)"
    base_legal: "LGPD Art. 5, XI — prescrição é dado de saúde sensível. Receituário eletrônico e substâncias sujeitas a regime especial possuem requisitos adicionais."
    risk: "Identificadores de receita vinculam paciente a medicamentos e diagnóstico implícito. Em farmácias e hospitais, permitem reconstrução de histórico clínico."
    recommendation: "Tratar dados de receituário como sensíveis (LGPD Art. 11). Criptografar e restringir acesso. Alinhar retenção a obrigações sanitárias aplicáveis. Consultar DPO, CISO e jurídico/regulatório."
    priority: "ALTA"
    relevant_for: "DPO, CISO, farmácias, hospitais, distribuidoras, indústria farmacêutica"
