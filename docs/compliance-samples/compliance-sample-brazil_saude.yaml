# Brazil — Setor de saúde: identificadores e dados sensíveis
# Reguladores: CFM, CFF, CFO, COFEN, ANVISA, ANS; LGPD Art. 5, XI — dados de saúde
# são dados pessoais sensíveis (Art. 11 — bases legais reforçadas).
#
# NOT LEGAL ADVICE. Technical starting point for data inventory.
# Pair with: compliance-sample-lgpd.yaml (mandatory for any Brazilian processing)
#
# How to use:
#   regex_overrides_file: path/to/compliance-sample-brazil_saude.yaml
#   ml_patterns_file:     path/to/compliance-sample-brazil_saude.yaml
#   Merge recommendation_overrides into report.recommendation_overrides.
#
# CRM/CRF/CRO/COREN shapes vary by state council; patterns are heuristic (high FP risk
# in generic text). Review noisy corpora with counsel.

regex:
  - name: "BR_SAUDE_CRM"
    pattern: "(?i)\\b(?:CRM)\\s*[/\\-]?\\s*(?:[A-Z]{2}\\s*)?\\d{4,6}\\b|\\b\\d{4,6}\\s*/\\s*[A-Z]{2}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — CRM médico)"

  - name: "BR_SAUDE_CRF"
    pattern: "(?i)\\b(?:CRF)\\s*[/\\-]?\\s*(?:[A-Z]{2}\\s*)?\\d{4,6}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — CRF farmacêutico)"

  - name: "BR_SAUDE_CRO"
    pattern: "(?i)\\b(?:CRO)\\s*[/\\-]?\\s*(?:[A-Z]{2}\\s*)?\\d{4,6}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — CRO dentista)"

  - name: "BR_SAUDE_COREN"
    pattern: "(?i)\\b(?:COREN)\\s*[/\\-]?\\s*(?:[A-Z]{2}\\s*)?\\d{5,7}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — COREN enfermagem)"

  - name: "BR_SAUDE_CNS"
    pattern: "(?i)\\b(?:CNS|cartao\\s+nacional\\s+de\\s+saude)[\\s:\\-]*\\d{15}\\b|\\b[12789]\\d{14}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — CNS)"

  - name: "BR_SAUDE_ANVISA_RMS"
    pattern: "\\b1\\.\\d{4}\\.\\d{4}\\.\\d{3}-\\d{1}\\b"
    norm_tag: "LGPD Art. 5 (dado regulatório — ANVISA RMS)"

  - name: "BR_SAUDE_ANVISA_CONTEXTUAL"
    pattern: "(?i)\\b(?:registro\\s+ms|reg\\.?\\s*ms|ANVISA|registro\\s+anvisa)[\\s:\\-]*[\\d\\.\\-]{10,18}\\b"
    norm_tag: "LGPD Art. 5 (dado regulatório — ANVISA)"

  - name: "BR_SAUDE_ANS"
    pattern: "(?i)\\b(?:ANS|registro\\s+ans|operadora\\s+ans)[\\s:\\-]*\\d{6}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — ANS operadora)"

  - name: "BR_SAUDE_RECEITUARIO"
    pattern: "(?i)\\b(?:numero\\s+receita|receituario\\s+n[o°]?|prescription\\s+id|rx\\s+n[o°]?)[\\s:\\-]*[A-Z0-9]{4,15}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — receituário)"

  - name: "BR_SAUDE_PRONTUARIO"
    pattern: "(?i)\\b(?:prontuario|n[o°]?\\s+prontuario|medical\\s+record|MRN)[\\s:\\-]*[A-Z0-9]{4,12}\\b"
    norm_tag: "LGPD Art. 5 (dado de saúde — prontuário)"

