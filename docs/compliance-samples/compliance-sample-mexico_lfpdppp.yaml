# Mexico LFPDPPP — sample compliance profile (Ley Federal de Protección de Datos
# Personales en Posesión de los Particulares)
#
# Target audience: Mexico and LATAM deployments; controllers/processors subject to
# Mexican federal private-sector personal data law. Authority: INAI (Instituto
# Nacional de Transparencia, Acceso a la Información y Protección de Datos Personales).
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-mexico_lfpdppp.yaml
#        ml_patterns_file: path/to/compliance-sample-mexico_lfpdppp.yaml
#   2. Merge the recommendation_overrides list below into your config under
#      report.recommendation_overrides.
#
# Legal scope (summary — not legal advice):
#   - LFPDPPP regulates processing of personal data by private parties; key constructs
#     include datos personales, datos personales sensibles, titular, responsable,
#     encargado, tratamiento, consentimiento, derechos ARCO, aviso de privacidad,
#     and domestic / international transfers. Secondary regulation and sector practice
#     evolve — scope with Mexican counsel.
#   - CURP and RFC appear in HR, tax, and identity workflows; patterns below use
#     **contextual** labels to reduce false positives vs bare alphanumeric strings.
#   - Precise geolocation: same four-decimal geometry as compliance-sample-us_va_vcdpa.yaml.
#   - Data Boar performs technical pattern/term matching only — not legal basis,
#     consent validity, or INAI complaint classification.
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "MX_CURP_CTX"
    pattern: "(?i)(?:CURP|clave\\s+u\u00fanica\\s+de\\s+registro)\\s*[:#]?\\s*\\b[A-Z\u00d1]{4}\\d{6}[HM][A-Z\u00d1]{2}[A-Z0-9\u00d1]{5}\\b"
    norm_tag: "Mexico LFPDPPP"
  - name: "MX_RFC_CTX"
    pattern: "(?i)(?:RFC|registro\\s+federal\\s+de\\s+contribuyentes)\\s*[:#]?\\s*\\b[A-Z\u00d1&]{3,4}\\d{6}[A-Z0-9\u00d1]{2,3}\\b"
    norm_tag: "Mexico LFPDPPP"
  - name: "MX_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Mexico LFPDPPP"
  - name: "MX_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Mexico LFPDPPP"
  - name: "MX_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Mexico LFPDPPP"
  - name: "MX_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Mexico LFPDPPP"

