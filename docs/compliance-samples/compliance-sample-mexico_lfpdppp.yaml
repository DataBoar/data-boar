recommendation_overrides:
  - norm_tag_pattern: "Mexico LFPDPPP"
    base_legal: "Mexico LFPDPPP (Ley Federal de Protección de Datos Personales en Posesión de los Particulares); INAI (transparency and personal data protection authority for the federal law)."
    risk: "Personal and sensitive personal data; ARCO rights; privacy notice; domestic and international transfers; high-sensitivity inventory signals (biometrics, health, precise geolocation) require governance alignment — statutory exceptions and sector overlays are not evaluated by the scanner."
    recommendation: "Map inventory to LFPDPPP roles (responsable/encargado); maintain aviso de privacidad and consent/transfer documentation; pair technical findings with counsel on INAI-facing posture and cross-border mechanisms."
    priority: "ALTA"
    relevant_for: "DPO, Privacy Counsel, INAI liaison, Responsable, Encargado"
