# South Korea Personal Information Protection Act (PIPA) – sample compliance profile
#
# Target audience: Republic of Korea deployments; controllers/processors handling
# personal information of data subjects in South Korea or Korean operations abroad.
# Regulator: Personal Information Protection Commission (PIPC; 개인정보보호위원회).
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-south_korea_pipa.yaml
#        ml_patterns_file: path/to/compliance-sample-south_korea_pipa.yaml
#   2. Merge the recommendation_overrides list below into your config under
#      report.recommendation_overrides.
#
# Legal scope (summary — not legal advice):
#   - Personal Information Protection Act (개인정보 보호법), as amended (notably
#     2020 "three-data" framework alignment and subsequent sensitive-information
#     and cross-border rules). PIPA sits with related acts (e.g. network usage,
#     credit information) — scope with Korean counsel for sector-specific law.
#   - Key constructs: personal information (개인정보), unique identification
#     information (고유식별정보; e.g. Resident Registration Number), sensitive
#     information (민감정보), pseudonymous information (가명정보), personal
#     information processor (개인정보처리자), entrustment (위탁), third-party
#     provision (제3자 제공), overseas transfer (국외 이전).
#   - Biometric data: Korea imposes strict consent and limitation rules; treat
#     biometric findings as high-sensitivity inventory signals.
#   - Data Boar output is technical pattern/term matching only — not consent,
#     lawful basis, or PIPC enforcement classification.
#
# Regex design:
#   - KR_RRN_CTX: Resident Registration Number (주민등록번호) — 6 digits (birth
#     date YYMMDD), hyphen, 7 digits; **contextual** prefix (Korean or English)
#     to reduce false positives on arbitrary date-like strings.
#   - KR_BIZ_REG_CTX: Business registration number (사업자등록번호) — NNN-NN-NNNNN;
#     contextual prefix (often appears on invoices and HR/tax exports).
#   - KR_PASSPORT: Machine-readable passport — one letter + 8 digits (common MOFA
#     series); contextual where possible (high collision with generic alphanumeric).
#   - Precise geolocation: same four-decimal geometry as compliance-sample-us_va_vcdpa.yaml.
#     Location data identifying a natural person is personal information under PIPA.
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "KR_RRN_CTX"
    # 주민등록번호 — always use near labels in real systems; pattern requires context
    pattern: "(?i)(?:주민등록번호|RRN|resident\\s+registration(?:\\s+number)?)\\s*[:#]?\\s*\\d{6}-[1-4]\\d{6}\\b"
    norm_tag: "South Korea PIPA"
  - name: "KR_BIZ_REG_CTX"
    pattern: "(?i)(?:사업자등록번호|business\\s+registration(?:\\s+number)?)\\s*[:#]?\\s*\\d{3}-\\d{2}-\\d{5}\\b"
    norm_tag: "South Korea PIPA"
  - name: "KR_PASSPORT_CTX"
    pattern: "(?i)(?:passport|여권|MOFA)\\s*[:#]?\\s*\\b[M|T|S]\\d{8}\\b"
    norm_tag: "South Korea PIPA"
  - name: "KR_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "South Korea PIPA"
  - name: "KR_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "South Korea PIPA"
  - name: "KR_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "South Korea PIPA"
  - name: "KR_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "South Korea PIPA"

