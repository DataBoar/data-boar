recommendation_overrides:
  - norm_tag_pattern: "South Korea PIPA"
    base_legal: "Republic of Korea Personal Information Protection Act (개인정보 보호법; PIPA), as amended; regulator: Personal Information Protection Commission (PIPC; 개인정보보호위원회). Related sector laws (e.g. network usage, credit information) may apply concurrently — scope with Korean counsel."
    risk: "Personal information under PIPA includes unique identification information (e.g. Resident Registration Number when labeled), sensitive information (health, biometric, genetic, political views, union membership, sexual orientation, criminal record, and other statutory categories), pseudonymous information where re-identification is possible, and location data that identifies a natural person. Biometric processing attracts heightened consent and purpose-limitation scrutiny. Overseas transfer and third-party provision require statutory bases and safeguards. Coordinate-shaped values in exports/logs are heuristic inventory signals only — not automatic PIPC classification."
    recommendation: "Map all 개인정보처리자 / processor roles; publish and maintain 개인정보 처리방침; obtain valid consent (including separate consent where PIPA requires) for sensitive information, biometrics, third-party provision, overseas transfer, and marketing; execute entrustment agreements (위탁) and flow-down controls for 수탁자; conduct impact assessments where required; implement breach response and notification practice aligned with PIPC guidance; restrict 고유식별정보 collection/storage to legal minima; document 국외 이전 mechanisms (e.g. adequacy, SCCs, or Korean-law equivalents); designate privacy 책임자 and train workforce; for 영상정보처리기기 (CCTV), follow posting and retention rules — verify with Korean counsel for your sector."
    priority: "ALTA"
    relevant_for: "DPO, Legal, Information Security, Korean operations, cloud/SaaS serving Korean users, HR and payroll exports"
