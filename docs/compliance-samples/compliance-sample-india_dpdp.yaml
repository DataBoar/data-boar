recommendation_overrides:
  - norm_tag_pattern: "India DPDP"
    base_legal: "Digital Personal Data Protection Act 2023 (DPDP Act); Data Protection Board of India (DPBI); Central Government rules and notifications (evolving)"
    risk: "Personal data of data principals in India; Aadhaar/PAN and other identifiers; precise coordinate-shaped values in logs/APIs are heuristic inventory signals only (not DPBI classification). Significant Data Fiduciary obligations, children's data, cross-border transfer restrictions, and breach intimation timelines depend on facts and current rules — the scanner does not evaluate them."
    recommendation: "Map processing to data fiduciary vs data processor roles; document consent and lawful bases; appoint Consent Manager where applicable; align with DPBI guidance and MeitY notifications as updated; implement grievance redressal and data principal rights workflows; involve Indian privacy counsel for SDF designation, cross-border transfers, and children's data."
    priority: "ALTA"
    relevant_for: "DPO, Data Fiduciary, DPBI, Legal, Information Security, Product"
