# India DPDP – sample compliance profile (Digital Personal Data Protection Act 2023, DPBI)
#
# NOT LEGAL ADVICE. Technical inventory signals only; rules, notifications, and Board practice
# under the DPDP Act continue to evolve — revalidate with qualified Indian counsel.
#
# Target audience: India deployments. Data Protection Board of India (DPBI); data fiduciary /
# data principal; consent and lawful processing. Terms primarily EN (common in Indian tech
# stacks); common alternate spellings (e.g. Aadhaar / Aadhar) where operators mirror UI copy.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-india_dpdp.yaml
#        ml_patterns_file: path/to/compliance-sample-india_dpdp.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - DPDP Act 2023 applies to digital personal data processed in India or outside India if
#     offering goods/services to data principals in India. Exemptions (e.g. certain state
#     instruments, research, startups in prescribed cases) are not evaluated by the scanner.
#   - Data Boar performs pattern and term matching only. It does not classify lawful basis,
#     consent validity, Significant Data Fiduciary (SDF) designation, or cross-border transfer
#     whitelists. Use output as inventory signal; scope with counsel.
#
# Regex design:
#   - AADHAAR_IN / PAN_IN: high-signal Indian identifiers (spacing variants on Aadhaar).
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml. Location data that identifies a data principal is
#     personal data under the DPDP Act. Heuristic coordinate-shape signals only — not automatic
#     DPBI classification.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  - name: "AADHAAR_IN"
    pattern: "\\b\\d{4}\\s?\\d{4}\\s?\\d{4}\\b"
    norm_tag: "India DPDP"
  - name: "PAN_IN"
    pattern: "\\b[A-Z]{5}\\d{4}[A-Z]\\b"
    norm_tag: "India DPDP"
  # Precise geolocation (personal data when it identifies a data principal — DPDP Act 2023)
  - name: "DPDP_IN_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "India DPDP"
  - name: "DPDP_IN_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "India DPDP"
  - name: "DPDP_IN_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "India DPDP"
  - name: "DPDP_IN_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "India DPDP"

