# Colorado Privacy Act (CPA) — Minors / Under-18 provisions — sample profile
#
# Target audience: US deployments processing data of Colorado consumers, with
# elevated risk for processors of minors' data under CPA § 6-1-1308 and AG Final Rules.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-us_co_cpa_minors.yaml
#        ml_patterns_file: path/to/compliance-sample-us_co_cpa_minors.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Legal scope:
#   - Colorado Privacy Act (CPA), C.R.S. § 6-1-1301 et seq., effective July 1, 2023.
#   - Regulator: Colorado Attorney General (AG).
#   - AG Final Rules: adopted December 2022, effective July 1, 2023.
#   - Applies to: controllers that (1) conduct business in CO or target CO residents, AND
#     process personal data of ≥100,000 consumers/year OR ≥25,000 consumers/year where
#     personal data is sold.
#   - Consumer rights: access, correction, deletion, data portability, opt-out
#     (targeted advertising, sale, profiling with legal/significant effects).
#   - Universal Opt-Out Mechanism (UOOM): controllers must honor browser-based global
#     opt-out signals (e.g. GPC) as of July 1, 2024.
#   - Sensitive data categories (§ 6-1-1303(25)): racial/ethnic origin, religious beliefs,
#     mental/physical health, sex life/sexual orientation, citizenship/immigration status,
#     genetic data, biometric data, children's personal data (known minor's data).
#   - Data Protection Assessments (DPA): required for high-risk processing (targeted ads,
#     sale, sensitive data, profiling, large-scale public place processing).
#
# Minors-specific provisions (CPA § 6-1-1308 + AG Rules § 6.08):
#   - Under-13: data of known children processed subject to COPPA; CPA § 6-1-1308 treats
#     children's personal data as a "sensitive data" category requiring heightened consent.
#   - Ages 13–17: controllers may NOT process personal data of "known minors" for targeted
#     advertising or sale without the consumer's consent (opt-in for those cohorts).
#   - "Known minor" is determined from context signals (account registration, age gates,
#     parental controls, inferred signals); CPA does not require active age verification
#     but demands proportional diligence.
#   - Processing sensitive data of known minors requires explicit consent regardless of age.
#   - Data Protection Assessment required before processing known minors' data for profiling.
#
# Detection note:
#   - The scanner does NOT determine "known minor" status or whether a real person is under 18.
#   - Regex patterns flag text fragments referencing CPA, minors, or age-related identifiers.
#   - Precise geolocation patterns flag coordinate-shaped values in structured data (API
#     responses, DB exports, log lines); location data is personal data under CPA § 6-1-1303(16).
#   - Use scanner output as metadata inventory signal; scope with Colorado privacy counsel.
#
# Regex design:
#   - CO_CPA_REF: text-level reference to "Colorado Privacy Act".
#   - CO_CPA_MINOR_REF: contextual pattern catching "known minor", "under 18 colorado",
#     "consumer under 18" phrases in data content or log text.
#   - CO_CPA_DOB: date-of-birth field pattern (ISO YYYY-MM-DD) adjacent to age/minor signals.
#     Wide regex — expect false positives outside age-gate / registration context.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml.
#     Location data is personal data under CPA § 6-1-1303(16).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "CO_CPA_REF"
    # Text-level reference to Colorado Privacy Act
    pattern: "(?i)\\bColorado\\s+Privacy\\s+Act\\b"
    norm_tag: "CO CPA minors"
  - name: "CO_CPA_MINOR_REF"
    # Contextual phrase: known minor / consumer under 18 / under 13 / under 17 / under 18
    pattern: "(?i)\\b(?:known\\s+minor|consumer\\s+under\\s+1[38]|under\\s+(?:thirteen|seventeen|eighteen)|under\\s+1[38]\\s+years?|child(?:ren)?(?:'?s)?\\s+(?:personal\\s+)?data|minor(?:'?s)?\\s+data)\\b"
    norm_tag: "CO CPA minors"
  - name: "CO_CPA_DOB"
    # ISO date-of-birth (YYYY-MM-DD) — wide pattern; triage with field-name context
    pattern: "(?i)(?:dob|date_of_birth|birth_date|birthdate)\\s*[=:\\s]\\s*\\d{4}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\\d|3[01])"
    norm_tag: "CO CPA minors"
  # Precise geolocation (CPA § 6-1-1303(16) — location data is personal data)
  - name: "CO_CPA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "CO CPA minors"
  - name: "CO_CPA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "CO CPA minors"
  - name: "CO_CPA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "CO CPA minors"
  - name: "CO_CPA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "CO CPA minors"

