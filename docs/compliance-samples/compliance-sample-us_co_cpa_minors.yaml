recommendation_overrides:
  - norm_tag_pattern: "CO CPA minors"
    base_legal: "Colorado Privacy Act (CPA), C.R.S. § 6-1-1301 et seq., effective July 1, 2023; AG Final Rules (December 2022); § 6-1-1308 (minors); Universal Opt-Out Mechanism required as of July 1, 2024"
    risk: "Fields or content may relate to processing personal data of known minors (under 13: COPPA + CPA sensitive-data consent; ages 13–17: opt-in required before targeted advertising or sale). Sensitive data categories (racial/ethnic origin, health, biometric, genetic, sexual orientation, citizenship, children's data) require heightened consent and a Data Protection Assessment before high-risk use. Location data (precise coordinates) is personal data under CPA § 6-1-1303(16). Findings are heuristic inventory signals only — scanner does NOT determine known-minor status."
    recommendation: "Review whether 'known minor' processing obligations under § 6-1-1308 apply; obtain explicit consent for targeted advertising or sale to consumers ages 13–17; apply COPPA requirements for under-13 cohorts; conduct Data Protection Assessment before processing sensitive data of known minors for profiling; honor Universal Opt-Out Mechanism (GPC) signals as of July 1, 2024; maintain processing records for AG audit readiness."
    priority: "ALTA"
    relevant_for: "DPO, Colorado privacy counsel, product/engineering (age-gate, UOOM), incident response"
