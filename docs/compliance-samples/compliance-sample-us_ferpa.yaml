recommendation_overrides:
  - norm_tag_pattern: "FERPA"
    base_legal: "FERPA (20 U.S.C. § 1232g); FPCO — Family Policy Compliance Office, US Department of Education (complaint and guidance channel)."
    risk: "Education records or components (e.g. SSN-shaped identifiers, contextual student IDs, dates of birth, grades, enrollment, directory or non-directory student data) — inventory signals for records that may be subject to FERPA. Directory-information opt-outs, school-official roles, and statutory exceptions are not evaluated by the scanner."
    recommendation: "Treat findings as catalog of where student-related fields concentrate; map to responsible institutional records policy; confirm disclosures, consent, and vendor flows with FERPA counsel; document retention and subprocessors for LMS/SIS exports."
    priority: "ALTA"
    relevant_for: "FERPA Compliance Officer, Registrar, DPO, Legal, Student Records, EdTech vendor counsel"
