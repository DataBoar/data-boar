# US FERPA — sample compliance profile (education records)
#
# Target audience: US K-12 districts, higher-education institutions, and EdTech vendors
# that maintain or process student education records. Statute: Family Educational
# Rights and Privacy Act (FERPA), 20 U.S.C. § 1232g; enforcement guidance and complaints
# via FPCO (Family Policy Compliance Office), US Department of Education.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-us_ferpa.yaml
#        ml_patterns_file: path/to/compliance-sample-us_ferpa.yaml
#   2. Merge the recommendation_overrides list below into your config under
#      report.recommendation_overrides.
#
# Legal scope (summary — not legal advice):
#   - FERPA protects **education records** — records directly related to a student
#     maintained by the institution or a party acting for it. Directory information,
#     de-identified records, and certain law-enforcement / treatment exceptions have
#     nuance the scanner does **not** evaluate.
#   - The scanner flags **inventory signals** (SSN-shaped values, contextual student IDs,
#     DOB fields, LMS/SIS vocabulary, grade/roster language). It does **not** decide
#     whether a row is an education record, whether directory-information opt-out applies,
#     or whether a disclosure meets a FERPA exception.
#   - Pair with `compliance-sample-us_ftc_coppa.yaml` when under-13 online collection
#     may co-apply; pair with `docs/MINOR_DETECTION.md` class hints for triage.
#
# Regex design:
#   - FERPA_SSN: same geometry as `CCPA_SSN` in compliance-sample-us_ca_cpra.yaml
#     (ddd-dd-dddd); common in financial-aid and legacy SIS exports — high sensitivity.
#   - FERPA_STUDENT_ID: alphanumeric ID with contextual column-style labels only.
#   - FERPA_DOB: date-of-birth labels with common date shapes (slash/dash; US-friendly).
#   - Precise geolocation: four-pattern geometry from compliance-sample-us_va_vcdpa.yaml
#     (field trips, bus tracking, campus apps — treat as inventory signal; not a FERPA
#     legal determination).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "FERPA_SSN"
    pattern: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
    norm_tag: "FERPA"
  - name: "FERPA_STUDENT_ID"
    pattern: "(?i)\\b(?:student\\s+(?:id|identifier|no\\.?|number)|learner\\s+id|pupil\\s+id|sis\\s+(?:id|student)|enrollment\\s+(?:id|number))\\s*[:#]?\\s*[A-Z0-9]{6,12}\\b"
    norm_tag: "FERPA"
  - name: "FERPA_DOB"
    pattern: "(?i)\\b(?:date\\s+of\\s+birth|d\\.?o\\.?b\\.?|birth\\s*date)\\s*[:#]?\\s*(?:\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}|\\d{4}[/-]\\d{1,2}[/-]\\d{1,2})\\b"
    norm_tag: "FERPA"
  - name: "FERPA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "FERPA"
  - name: "FERPA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "FERPA"
  - name: "FERPA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "FERPA"
  - name: "FERPA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "FERPA"

