recommendation_overrides:
  - norm_tag_pattern: "Singapore PDPA"
    base_legal: "Personal Data Protection Act 2012 (PDPA); PDPC — Personal Data Protection Commission; Amendment Act 2020 (effective 2021/2022)"
    risk: "Personal data of individuals in Singapore in scope of PDPA. Precise coordinate-shaped values in logs/APIs are heuristic inventory signals only — not automatic PDPC classification. Mandatory breach notification (72-hour window for significant harm) applies from Feb 2021 amendment."
    recommendation: "Specify purpose and obtain valid consent or rely on an enumerated exception; implement data protection policies and appoint a Data Protection Officer (DPO); comply with mandatory breach notification (PDPC within 3 business days if significant harm/500+ individuals); respect DNC registry; review overseas transfer obligations with counsel."
    priority: "ALTA"
    relevant_for: "DPO, PDPC, Legal, Information Security, Product"
