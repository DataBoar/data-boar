# Singapore PDPA – sample compliance profile (Personal Data Protection Act 2012, PDPC)
#
# Target audience: Singapore and APAC deployments. Terms in English so column names
# in Singapore tech/fintech/health stacks are detected.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-singapore_pdpa.yaml
#        ml_patterns_file: path/to/compliance-sample-singapore_pdpa.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Singapore: PDPA 2012 (amended by Personal Data Protection (Amendment) Act 2020, effective
# 1 Feb 2021 / 1 Oct 2022 phased); Personal Data Protection Commission (PDPC); mandatory
# breach notification; data portability (Business Improvement direction); enhanced consent
# framework; Do Not Call (DNC) registry.
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25)
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20)
#
# Legal scope (read before relying on tags):
#   - PDPA applies to private-sector organisations collecting, using, or disclosing personal
#     data in/from Singapore. Public agencies are separately regulated.
#   - Data Boar performs technical pattern and term matching only. It does NOT evaluate
#     consent, purpose limitation, or breach notification thresholds. Use output as inventory
#     signal; scope determination with counsel.
#
# Regex design:
#   - NRIC_SG: Singapore National Registration Identity Card / FIN / Employment Pass
#     (letter + 7 digits + check letter; prefixes S/T/F/G).
#   - SG_UEN: Unique Entity Number — 9–10 alphanumeric characters used to identify business
#     entities; may appear alongside personal data in B2B records (heuristic; not guaranteed).
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml
#     and compliance-sample-eu_gdpr.yaml. PDPA Advisory Guidelines (location data) confirm
#     that precise location data identifying an individual is personal data. Patterns are
#     heuristic coordinate-shape signals only — not automatic PDPC classification.
#
# Use double-quoted YAML with escaped backslashes (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  - name: "NRIC_SG"
    # Singapore NRIC / FIN / Employment Pass: S/T/F/G + 7 digits + check letter
    pattern: "\\b[SFTG]\\d{7}[A-Z]\\b"
    norm_tag: "Singapore PDPA"
  - name: "SG_UEN"
    # Singapore Unique Entity Number: 9-10 chars (YYYYNNNNNC or NNNNNNNNC)
    pattern: "\\b(?:\\d{4}[A-Z]{1,2}\\d{4}[A-Z]|\\d{8,9}[A-Z])\\b"
    norm_tag: "Singapore PDPA"
  # Precise geolocation (PDPC Advisory Guidelines confirm location data identifying
  # an individual = personal data under PDPA s.2)
  - name: "SG_PDPA_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Singapore PDPA"
  - name: "SG_PDPA_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Singapore PDPA"
  - name: "SG_PDPA_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Singapore PDPA"
  - name: "SG_PDPA_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Singapore PDPA"

