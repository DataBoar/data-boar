# EU GDPR – sample compliance profile (EEA; EU 27 + EEA states)
#
# Target audience: EEA deployments; contracts requiring EU (not UK) alignment. Norm_tag
# "EU GDPR" for EDPB and member-state DPA references. Optional EN + DE/FR terms for multilingual EU data.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-eu_gdpr.yaml
#        ml_patterns_file: path/to/compliance-sample-eu_gdpr.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Detection thresholds (not configurable in this file; set in main config.yaml):
#   - sensitivity_detection.fuzzy_column_match_min_confidence (int, default 25):
#       Minimum Levenshtein similarity for fuzzy column-name matching.
#       Raise to 60-80 to reduce false positives on short column names.
#   - sensitivity_detection.embedding_prototype_hint_min_confidence (int, default 20):
#       Minimum cosine similarity for embedding-based prototype hints.
#   The ML confidence score (0-100) is computed internally by scikit-learn
#   predict_proba; there is no per-term min_confidence field in this YAML.
#
# Regulation (EU) 2016/679; EDPB; member-state DPAs.
#
# Precise geolocation (logs / APIs): same regex geometry as compliance-sample-us_va_vcdpa.yaml
# (JSON lat/lng, location: pair, latitude=&longitude=); norm_tag stays "EU GDPR" for EEA inventory.
# Heuristic only - not an automated Art. 9 / special-category legal determination.

regex:
  - name: "EU_IBAN"
    pattern: "\\b[A-Z]{2}\\d{2}\\s?\\d{4}\\s?\\d{4}\\s?\\d{4}\\s?\\d{4}\\s?\\d{0,4}\\b"
    norm_tag: "EU GDPR"
  - name: "EU_VAT"
    pattern: "\\b[A-Z]{2}?\\s?[A-Z0-9]{8,12}\\b"
    norm_tag: "EU GDPR"
  - name: "EU_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "EU GDPR"
  - name: "EU_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "EU GDPR"
  - name: "EU_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "EU GDPR"
  - name: "EU_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "EU GDPR"

