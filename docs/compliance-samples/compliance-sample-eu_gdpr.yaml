recommendation_overrides:
  - norm_tag_pattern: "PII_AMBIGUOUS"
    base_legal: "Generic identifier – confirm manually"
    risk: "Column name is generic (doc_id, document_id, id_number, etc.). May be PII or internal ID."
    recommendation: "Confirm manually: verify whether the column contains personal data (PII) or only an internal identifier. If PII, apply access controls and lawful basis; if internal, treat as medium priority."
    priority: "MÉDIA"
    relevant_for: "Operator, DPO, Information Security"
  - norm_tag_pattern: "EU GDPR"
    base_legal: "Regulation (EU) 2016/679 Art. 4(1); Recitals; EDPB"
    risk: "Identification of data subject; personal data as defined in EU GDPR."
    recommendation: "Apply EU GDPR safeguards; ensure lawful basis and member-state DPA compliance; consider EDPB guidance."
    priority: "ALTA"
    relevant_for: "DPO, EU Representative, Lead DPA, EDPB"
