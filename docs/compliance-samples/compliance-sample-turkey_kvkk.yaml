# Turkey KVKK – sample compliance profile (Law 6698; Kişisel Verileri Koruma Kurumu)
#
# Target audience: Turkish deployments and KVKK compliance. Kişisel Verileri Koruma
# Kurumu (KVKK Board); veri sorumlusu (data controller) / veri işleyen (data processor).
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-turkey_kvkk.yaml
#        ml_patterns_file: path/to/compliance-sample-turkey_kvkk.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# Legal scope:
#   - Law 6698 on the Protection of Personal Data (KVKK), enacted 7 April 2016.
#     Broadly modelled on EU Directive 95/46/EC; convergence towards GDPR ongoing.
#   - Key obligations: registration in VERBİS (data controller registry) for large controllers;
#     explicit consent (açık rıza) for sensitive data categories; cross-border transfer via
#     KVKK Board approval or binding corporate rules.
#   - Sensitive data (Art. 6): race, ethnic origin, political opinion, philosophical belief,
#     religion, sect, other beliefs, appearance and dress, trade union membership, health,
#     sexual life, criminal conviction, biometric and genetic data.
#   - Amendment Law 7499 (2024): aligned breach notification with GDPR 72-hour rule
#     (previously 72 h guideline only, now statutory).
#   - The scanner does not evaluate VERBİS registration or cross-border transfer approvals.
#     Use output as inventory signal; scope with KVKK-specialist counsel.
#
# Regex design:
#   - TC_KIMLIK: Turkish national ID number (T.C. Kimlik No); 11 digits, first digit non-zero.
#     Spaced-display variant (TC_KIMLIK_ALT) covers plain 11-digit strings without digit-zero start.
#   - Precise geolocation: same four-decimal-place geometry as compliance-sample-us_va_vcdpa.yaml.
#     Location data is personal data under KVKK Art. 3 (direct/indirect identification).
#
# Use double-quoted YAML with escaped backslashes.

regex:
  - name: "TC_KIMLIK"
    # Turkish national ID — 11 digits, first digit non-zero
    pattern: "\\b[1-9]\\d{10}\\b"
    norm_tag: "Turkey KVKK"
  - name: "TC_KIMLIK_ALT"
    # Fallback: bare 11-digit string (higher FP rate; triage with context)
    pattern: "\\b\\d{11}\\b"
    norm_tag: "Turkey KVKK"
  # Precise geolocation (KVKK Art. 3 — location data identifying a natural person = personal data)
  - name: "KVKK_JSON_LAT_PRECISION"
    pattern: "(?i)[\"']lat[\"']\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\b"
    norm_tag: "Turkey KVKK"
  - name: "KVKK_JSON_LNG_PRECISION"
    pattern: "(?i)[\"'](?:lng|lon)[\"']\\s*:\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}\\b"
    norm_tag: "Turkey KVKK"
  - name: "KVKK_LOCATION_CSV_PAIR"
    pattern: "(?i)\\blocation\\s*:\\s*[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*,\\s*[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Turkey KVKK"
  - name: "KVKK_QUERYSTRING_LAT_LONG"
    pattern: "(?i)latitude=[-+]?(?:[1-8]?\\d|90)\\.\\d{4,}\\s*&\\s*longitude=[-+]?(?:180|1[0-7]\\d|[1-9]?\\d)\\.\\d{4,}"
    norm_tag: "Turkey KVKK"

