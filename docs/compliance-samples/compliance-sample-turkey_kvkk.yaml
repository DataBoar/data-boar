recommendation_overrides:
  - norm_tag_pattern: "Turkey KVKK"
    base_legal: "Law 6698 on the Protection of Personal Data (KVKK), April 2016; KVKK Board (Kişisel Verileri Koruma Kurumu); Amendment Law 7499 (2024) — 72-hour breach notification now statutory"
    risk: "Personal data and sensitive personal data categories under KVKK Art. 6 (race, ethnic origin, political opinion, religion, health, sexual life, criminal conviction, biometric and genetic data). Precise coordinate-shaped values are heuristic inventory signals only. Cross-border transfer requires KVKK Board approval or adequate safeguards. VERBİS registration mandatory for data controllers above the legal threshold."
    recommendation: "Obtain explicit consent (açık rıza) for sensitive data categories; register in VERBİS if legally required; fulfil data subject rights (Art. 11); notify KVKK Board and data subjects within 72 hours of a data breach (Law 7499 / 2024); confirm cross-border transfer legal basis; apply data minimisation and purpose limitation."
    priority: "ALTA"
    relevant_for: "DPO, Veri Sorumlusu, KVKK Board, Legal"
